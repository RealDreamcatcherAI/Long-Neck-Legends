<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | Long Neck Legends</title>
  <meta name="description" content="Buy and sell Long Neck Legends NFTs peer-to-peer on Solana.">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Permanent+Marker&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #040404;
      --card: #0b0b0b;
      --bdr: #141414;
      --r: #FF003C;
      --ra: rgba(255, 0, 60, .18);
      --rb: rgba(255, 0, 60, .06);
      --grn: #00FF88;
      --grna: rgba(0, 255, 136, .12);
      --w: #eee;
      --g1: #888;
      --g2: #444;
      --g3: #1e1e1e;
      --f: 'Space Mono', monospace;
      --d: 'Bebas Neue', sans-serif;
      --m: 'Permanent Marker', cursive
    }

    body {
      background: var(--bg);
      color: var(--w);
      font-family: var(--f);
      overflow-x: hidden
    }

    a {
      color: var(--r);
      text-decoration: none
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: #060606
    }

    ::-webkit-scrollbar-thumb {
      background: var(--r);
      border-radius: 3px
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes glow {

      0%,
      100% {
        text-shadow: 0 0 6px rgba(255, 0, 60, .4)
      }

      50% {
        text-shadow: 0 0 18px rgba(255, 0, 60, .6)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .6
      }

      50% {
        opacity: 1
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    @keyframes scroll {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(4, 4, 4, .96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #111
    }

    .site-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--r);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      box-shadow: 0 0 10px var(--ra)
    }

    .logo span {
      font-family: var(--d);
      font-size: 17px;
      letter-spacing: 4px;
      color: #fff
    }

    .nav-links {
      display: flex;
      gap: 3px;
      flex-wrap: wrap
    }

    .nav-links a {
      padding: 7px 12px;
      border-radius: 6px;
      font-family: var(--d);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--g1);
      border: 1px solid transparent;
      transition: all .2s
    }

    .nav-links a:hover {
      color: var(--r);
      background: var(--rb)
    }

    .nav-links a.active {
      color: var(--r);
      background: var(--rb);
      border-color: rgba(255, 0, 60, .2)
    }

    .ticker {
      background: var(--r);
      padding: 3px 0;
      overflow: hidden;
      white-space: nowrap
    }

    .ticker-inner {
      display: inline-block;
      animation: scroll 30s linear infinite
    }

    .ticker span {
      font-family: var(--f);
      font-size: 10px;
      color: #000;
      font-weight: 700;
      letter-spacing: 1px
    }

    .nft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
      padding: 0 16px 30px;
      max-width: 1400px;
      margin: 0 auto
    }

    .nft-card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all .3s;
      position: relative
    }

    .nft-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 28px var(--ra), 0 14px 36px rgba(0, 0, 0, .6);
      border-color: rgba(255, 0, 60, .22)
    }

    .nft-card:hover .nft-img {
      transform: scale(1.05)
    }

    .nft-img-wrap {
      height: 220px;
      background: #030303;
      overflow: hidden;
      position: relative
    }

    .nft-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease
    }

    .nft-info {
      padding: 10px 12px 12px
    }

    .nft-name {
      font-family: var(--d);
      font-size: 13px;
      color: #fff;
      letter-spacing: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .nft-owner {
      font-size: 9px;
      color: var(--g2);
      margin-top: 3px
    }

    .yours-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      background: var(--grna);
      border: 1px solid rgba(0, 255, 136, .2);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 8px;
      color: var(--grn);
      font-weight: 700
    }

    .listed-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      background: rgba(0, 0, 0, .75);
      border: 1px solid rgba(0, 255, 136, .3);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 9px;
      color: var(--grn);
      font-weight: 700;
      backdrop-filter: blur(4px)
    }

    .price-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 5px;
      font-family: var(--d);
      font-size: 14px;
      color: var(--grn);
      letter-spacing: 1px
    }

    .sk {
      background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px
    }

    .btn-primary {
      padding: 12px 24px;
      background: var(--r);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--d);
      font-size: 15px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 12px var(--ra);
      transition: all .2s;
      text-align: center;
      width: 100%
    }

    .btn-primary:hover {
      box-shadow: 0 0 24px rgba(255, 0, 60, .4)
    }

    .btn-primary:disabled {
      opacity: .4;
      cursor: not-allowed;
      box-shadow: none
    }

    .btn-green {
      padding: 12px 24px;
      background: #00c96a;
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--d);
      font-size: 15px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 12px var(--grna);
      transition: all .2s;
      text-align: center;
      width: 100%;
      font-weight: 700
    }

    .btn-green:hover {
      box-shadow: 0 0 24px rgba(0, 255, 136, .4)
    }

    .btn-green:disabled {
      opacity: .4;
      cursor: not-allowed;
      box-shadow: none
    }

    .btn-ghost {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(255, 0, 60, .2);
      color: var(--r);
      border-radius: 8px;
      font-family: var(--d);
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s;
      text-align: center
    }

    .btn-ghost:hover {
      background: var(--rb)
    }

    .btn-ghost:disabled {
      opacity: .3;
      cursor: not-allowed
    }

    .btn-danger {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid rgba(255, 0, 60, .35);
      color: var(--r);
      border-radius: 8px;
      font-family: var(--d);
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all .2s
    }

    .btn-danger:hover {
      background: rgba(255, 0, 60, .1)
    }

    .wallet-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #AB47FF, #7C3AED);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--d);
      font-size: 12px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(124, 58, 237, .2);
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .wallet-btn:hover {
      box-shadow: 0 0 22px rgba(124, 58, 237, .4)
    }

    .conn-btn {
      padding: 7px 12px;
      background: rgba(0, 255, 136, .06);
      border: 1px solid rgba(0, 255, 136, .18);
      border-radius: 10px;
      color: var(--grn);
      font-family: var(--f);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .dot-sm {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--grn);
      animation: pulse 2s infinite;
      display: inline-block
    }

    .input {
      padding: 10px 14px;
      background: #080808;
      border: 1px solid #1c1c1c;
      border-radius: 8px;
      color: var(--w);
      font-family: var(--f);
      font-size: 12px;
      outline: none;
      width: 100%
    }

    .input:focus {
      border-color: var(--r)
    }

    .neon {
      color: var(--r);
      animation: glow 3s ease-in-out infinite
    }

    .stat-card {
      text-align: center;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      min-width: 85px
    }

    .tab-btn {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--g2);
      font-family: var(--d);
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s
    }

    .tab-btn.active {
      color: var(--r);
      background: var(--rb);
      border-color: rgba(255, 0, 60, .2)
    }

    .tg {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
      font-weight: 700
    }

    .trait {
      background: var(--rb);
      border: 1px solid rgba(255, 0, 60, .08);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 10px;
      display: inline-block;
      margin: 2px
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .92);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(14px);
      animation: fade .15s;
      padding: 14px
    }

    .modal {
      background: linear-gradient(145deg, #0c0c0c, #080808);
      border: 1px solid #1c1c1c;
      border-radius: 16px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      max-height: 92vh;
      overflow-y: auto;
      position: relative
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: var(--rb);
      border: 1px solid var(--r);
      color: var(--r);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: grid;
      place-items: center
    }

    .offer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #0a0a0a;
      border: 1px solid #181818;
      border-radius: 8px;
      margin-bottom: 6px
    }

    .divider {
      height: 1px;
      background: #161616;
      margin: 14px 0
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: var(--grn);
      color: #000;
      padding: 10px 24px;
      border-radius: 8px;
      font-family: var(--d);
      font-size: 14px;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px var(--grna);
      animation: up .25s;
      white-space: nowrap
    }

    .toast.err {
      background: var(--r);
      color: #fff;
      box-shadow: 0 4px 20px var(--ra)
    }

    /* Activity Bar */
    .activity-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 500;
      background: rgba(6, 6, 6, .97);
      border-top: 1px solid #1a1a1a;
      backdrop-filter: blur(20px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1)
    }

    .activity-bar.open {
      transform: translateY(0)
    }

    .activity-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px;
      border-bottom: 1px solid #111
    }

    .activity-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 16px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--r) transparent
    }

    .activity-scroll::-webkit-scrollbar {
      height: 3px
    }

    .activity-scroll::-webkit-scrollbar-thumb {
      background: var(--r);
      border-radius: 2px
    }

    .activity-item {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: transform .15s
    }

    .activity-item:hover {
      transform: translateY(-2px)
    }

    .activity-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: #111;
      border: 1px solid #1c1c1c
    }

    .activity-price {
      font-family: var(--d);
      font-size: 12px;
      color: var(--grn);
      letter-spacing: 1px
    }

    .activity-time {
      font-size: 9px;
      color: var(--g2)
    }

    /* Filter Panel */
    .filter-panel {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 600;
      width: min(320px, 90vw);
      background: #060606;
      border-right: 1px solid #1a1a1a;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1)
    }

    .filter-panel.open {
      transform: translateX(0)
    }

    .filter-overlay {
      position: fixed;
      inset: 0;
      z-index: 599;
      background: rgba(0, 0, 0, .6);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s
    }

    .filter-overlay.open {
      opacity: 1;
      pointer-events: all
    }

    .filter-trait-group {
      margin-bottom: 14px
    }

    .filter-trait-group summary {
      font-family: var(--d);
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--g1);
      cursor: pointer;
      padding: 8px 0;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .filter-trait-group summary::-webkit-details-marker {
      display: none
    }

    .filter-val {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
      font-size: 10px;
      color: var(--g2)
    }

    .filter-val:hover {
      color: var(--w)
    }

    .filter-val input {
      accent-color: var(--r);
      width: 14px;
      height: 14px;
      cursor: pointer
    }

    .filter-val.active {
      color: var(--w)
    }

    /* Tool buttons */
    .tool-btn {
      padding: 7px 12px;
      background: #0a0a0a;
      border: 1px solid #1c1c1c;
      border-radius: 8px;
      color: var(--g1);
      font-family: var(--d);
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .2s;
      white-space: nowrap
    }

    .tool-btn:hover {
      border-color: rgba(255, 0, 60, .3);
      color: var(--w)
    }

    .tool-btn.active {
      border-color: rgba(255, 0, 60, .4);
      color: var(--r);
      background: var(--rb)
    }

    .site-footer {
      border-top: 1px solid #0e0e0e;
      padding: 20px;
      text-align: center
    }

    .site-footer a {
      color: var(--g2);
      margin: 0 8px;
      font-size: 10px;
      letter-spacing: 2px;
      font-family: var(--d)
    }

    .site-footer a:hover {
      color: var(--r)
    }

    @media(max-width:600px) {
      .nav-links {
        gap: 2px
      }

      .nav-links a {
        padding: 5px 8px;
        font-size: 9px;
        letter-spacing: 1px
      }

      .nft-grid {
        grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
        gap: 10px;
        padding: 0 10px 24px
      }

      .logo span {
        font-size: 14px;
        letter-spacing: 3px
      }
    }
  </style>
</head>

<body>

  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="/" class="logo">
        <div class="logo-icon">🐦</div>
        <span>LONG NECK LEGENDS</span>
      </a>
      <div class="nav-links">

  <div

  </div>
  <div id="app"></div>

  <!-- Filter overlay + panel -->
  <div class="filter-overlay" id="filter-overlay" onclick="closeFilter()"></div>

        <button onclick="closeFilter()"
          style="background:var(--rb);border:1px solid rgba(255,0,60,.2);color:var(--r);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;display:grid;place-items:center">✕</button>

  <!-- Activity Bar -->
  <div class="activity-bar" id="activity-bar">
    <div class="activity-bar-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:var(--d);font-size:14px;letter-spacing:3px;color:#fff">ACTIVITY</span>
        <span id="activity-count" style="font-size:9px;color:var(--g2)"></span>
      </div>
      <button onclick="closeActivity()"

    </div>
    <div class="activity-scroll" id="activity-scroll"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    const HELIUS_KEY = "33955d33-79ed-4817-8a40-1ce04a3cf241";
    const COLLECTION = "2WvxCvgFUiqUSBx32c5Z5Zsbcu4ZJCE1GEaaWpbD685P";

    const FEE_PCT = 0.025;

    // ─────────────────────────────────────────────
    //  AUCTION HOUSE HELPERS
    //  Builds raw instructions for the Metaplex AH program.
    //  No SDK needed — just web3.js + PDA derivation.
    // ─────────────────────────────────────────────

    // Anchor instruction discriminator: first 8 bytes of sha256("global:<name>")
    async function anchorDisc(name) {
      const data = new TextEncoder().encode("global:" + name);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return new Uint8Array(hash).slice(0, 8);
    }

    async function computeDiscriminators() {
      AH_IX.sell = await anchorDisc("sell");
      AH_IX.publicBuy = await anchorDisc("public_buy");
      AH_IX.executeSale = await anchorDisc("execute_sale");
      AH_IX.cancel = await anchorDisc("cancel");
      AH_IX.withdraw = await anchorDisc("withdraw");
    }

    // u64 little-endian encoding for instruction data
    function toLEU64(n) {
      const buf = new ArrayBuffer(8);
      const view = new DataView(buf);
      view.setBigUint64(0, BigInt(Math.round(n)), true);
      return new Uint8Array(buf);
    }

    // Concatenate Uint8Arrays
    function concatBytes(...arrays) {
      const total = arrays.reduce((s, a) => s + a.length, 0);
      const out = new Uint8Array(total);
      let off = 0;
      for (const a of arrays) { out.set(a, off); off += a.length; }
      return out;
    }

    // Derive Metaplex metadata PDA for an NFT mint
    function getMetadataPDA(PublicKey, mintPK) {
      const metaProg = new PublicKey(METADATA_PROGRAM);
      return PublicKey.findProgramAddressSync(
        [new TextEncoder().encode("metadata"), metaProg.toBuffer(), mintPK.toBuffer()],
        metaProg
      );
    }

    // Derive AH fee account PDA
    function getAHFeeAccount(PublicKey, ahPK, ahProgPK) {
      return PublicKey.findProgramAddressSync(
        [new TextEncoder().encode("auction_house"), ahPK.toBuffer(), new TextEncoder().encode("fee_payer")],
        ahProgPK
      );
    }

    // Derive AH treasury PDA
    function getAHTreasury(PublicKey, ahPK, ahProgPK) {
      return PublicKey.findProgramAddressSync(
        [new TextEncoder().encode("auction_house"), ahPK.toBuffer(), new TextEncoder().encode("treasury")],
        ahProgPK
      );
    }

    // Derive buyer escrow PDA
    function getBuyerEscrow(PublicKey, ahPK, buyerPK, ahProgPK) {
      return PublicKey.findProgramAddressSync(
        [new TextEncoder().encode("auction_house"), ahPK.toBuffer(), buyerPK.toBuffer()],
        ahProgPK
      );
    }

    // Derive program as signer PDA
    function getProgramAsSigner(PublicKey, ahProgPK) {
      return PublicKey.findProgramAddressSync(
        [new TextEncoder().encode("auction_house"), new TextEncoder().encode("signer")],
        ahProgPK
      );
    }

    // Derive seller trade state PDA
    function getSellerTradeState(PublicKey, sellerPK, ahPK, tokenAccPK, treasuryMintPK, mintPK, priceLamports, tokenSize, ahProgPK) {
      return PublicKey.findProgramAddressSync([
        new TextEncoder().encode("auction_house"),
        sellerPK.toBuffer(), ahPK.toBuffer(), tokenAccPK.toBuffer(),
        treasuryMintPK.toBuffer(), mintPK.toBuffer(),
        toLEU64(priceLamports), toLEU64(tokenSize)
      ], ahProgPK);
    }

    // Derive buyer trade state PDA
    function getBuyerTradeState(PublicKey, buyerPK, ahPK, treasuryMintPK, mintPK, priceLamports, tokenSize, ahProgPK) {
      return PublicKey.findProgramAddressSync([
        new TextEncoder().encode("auction_house"),
        buyerPK.toBuffer(), ahPK.toBuffer(),
        treasuryMintPK.toBuffer(), mintPK.toBuffer(),
        toLEU64(priceLamports), toLEU64(tokenSize)
      ], ahProgPK);
    }

    // Get the AH authority address from on-chain account data
    let _ahAuthority = null;
    async function getAHAuthority(conn, PublicKey) {
      if (_ahAuthority) return _ahAuthority;
      const ahPK = new PublicKey(AH_ADDRESS);
      const info = await conn.getAccountInfo(ahPK);
      if (!info) throw new Error("Auction House account not found on-chain");
      // AH account layout: offset 8 (discriminator) then first pubkey at offset 8 is auctionHouseFeeAccount,
      // Actually the layout is: 8 bytes discriminator, then fields in order.
      // Metaplex AH account layout (after 8-byte Anchor discriminator):
      // auction_house_fee_account: Pubkey (32), auction_house_treasury: Pubkey (32),
      // treasury_withdrawal_destination: Pubkey (32), fee_withdrawal_destination: Pubkey (32),
      // treasury_mint: Pubkey (32), authority: Pubkey (32), creator: Pubkey (32), bump: u8, ...
      // authority is at offset 8 + 32*5 = 168
      _ahAuthority = new PublicKey(info.data.slice(168, 200));
      return _ahAuthority;
    }

    // ─────────────────────────────────────────────
    //  LIST (Auction House Sell instruction)
    //  Seller signs → creates on-chain trade state
    //  NFT stays in wallet, AH gets delegate authority
    // ─────────────────────────────────────────────
    async function listNft(nft, priceSol) {
      const btn = document.getElementById("cl");
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>SIGNING...`; }

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const sellerPK = new PublicKey(walletAddress);
        const mintPK = new PublicKey(nft.mint);
        const ahPK = new PublicKey(AH_ADDRESS);
        const ahProgPK = new PublicKey(AH_PROGRAM);
        const treasuryMintPK = new PublicKey(WRAPPED_SOL);
        const tokenProgPK = new PublicKey(TOKEN_PROGRAM);
        const sysProgPK = new PublicKey(SYS_PROGRAM);
        const rentPK = new PublicKey(SYSVAR_RENT);

        const priceLamports = Math.round(parseFloat(priceSol) * LAMPORTS_PER_SOL);
        const tokenSize = 1;

        // Get seller's token account
        const sellerTokens = await conn.getTokenAccountsByOwner(sellerPK, { mint: mintPK });
        if (!sellerTokens.value.length) throw new Error("NFT not found in your wallet");
        const sellerTokenAccPK = sellerTokens.value[0].pubkey;

        // Derive PDAs
        const authority = await getAHAuthority(conn, PublicKey);
        const [ahFeeAcc] = getAHFeeAccount(PublicKey, ahPK, ahProgPK);
        const [sellerTradeState, tsB] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, priceLamports, tokenSize, ahProgPK);
        const [freeTradeState, ftsB] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, 0, tokenSize, ahProgPK);
        const [programAsSigner, pasB] = getProgramAsSigner(PublicKey, ahProgPK);
        const [metadataPDA] = getMetadataPDA(PublicKey, mintPK);

        // Build Sell instruction
        const ixData = concatBytes(
          AH_IX.sell,
          new Uint8Array([tsB, ftsB, pasB]),
          toLEU64(priceLamports),
          toLEU64(tokenSize)
        );

        const sellIx = {
          programId: ahProgPK,
          keys: [
            { pubkey: sellerPK, isSigner: true, isWritable: true },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: true },
            { pubkey: metadataPDA, isSigner: false, isWritable: false },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: sellerTradeState, isSigner: false, isWritable: true },
            { pubkey: freeTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: programAsSigner, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: ixData
        };

        const tx = new Transaction().add(sellIx);
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = sellerPK;

        const signed = await walletProvider.signTransaction(tx);
        if (btn) btn.innerHTML = `<span class="spinner"></span>CONFIRMING...`;
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        // Save to Supabase for UI
        await sbUpsert("marketplace_listings", {
          mint: nft.mint, seller: walletAddress,
          price_sol: parseFloat(priceSol),
          name: nft.name, image: nft.image
        });
        listings[nft.mint] = { mint: nft.mint, seller: walletAddress, price_sol: parseFloat(priceSol), name: nft.name, image: nft.image };
        showToast("Listed for " + priceSol + " SOL ✓");
        const lm = document.getElementById("lm"); if (lm) lm.remove();
        render();

      } catch (e) {
        console.error("[listNft] error:", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Listing cancelled", true);
        } else {
          showToast("Failed to list: " + (e.message || "unknown"), true);
        }
        if (btn) { btn.disabled = false; btn.innerHTML = "LIST FOR SALE"; }
      }
    }

        const sellerTokens = await conn.getTokenAccountsByOwner(sellerPK, { mint: mintPK });
        if (!sellerTokens.value.length) throw new Error("NFT not in wallet");
        const sellerTokenAccPK = sellerTokens.value[0].pubkey;

        const authority = await getAHAuthority(conn, PublicKey);
        const [ahFeeAcc] = getAHFeeAccount(PublicKey, ahPK, ahProgPK);
        const [sellerTradeState] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, priceLamports, 1, ahProgPK);

        const ixData = concatBytes(AH_IX.cancel, toLEU64(priceLamports), toLEU64(1));

        const cancelIx = {
          programId: ahProgPK,
          keys: [
            { pubkey: sellerPK, isSigner: true, isWritable: true },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: true },
            { pubkey: mintPK, isSigner: false, isWritable: false },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: sellerTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
          ],
          data: ixData
        };

        const tx = new Transaction().add(cancelIx);
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = sellerPK;

        const signed = await walletProvider.signTransaction(tx);
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        await sbDelete("marketplace_listings", { mint });
        delete listings[mint];
        showToast("Listing removed ✓");
        render();

        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }

    // ─────────────────────────────────────────────
    //  BUY NOW (PublicBuy + ExecuteSale in one tx)
    //  Buyer signs once → SOL escrowed + sale executed atomically
    // ─────────────────────────────────────────────
    async function buyNft(listing) {
      console.log("[buyNft] AH flow — wallet:", walletAddress, "mint:", listing?.mint);
      if (!walletAddress || !walletProvider) { showToast("Connect wallet first", true); return; }

      const btn = document.getElementById("buy-btn");
      const setBtn = (html, dis) => { if (btn) { btn.innerHTML = html; btn.disabled = dis; } };
      setBtn(`<span class="spinner"></span>BUILDING TX...`, true);

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const buyerPK = new PublicKey(walletAddress);
        const sellerPK = new PublicKey(listing.seller);
        const mintPK = new PublicKey(listing.mint);
        const ahPK = new PublicKey(AH_ADDRESS);
        const ahProgPK = new PublicKey(AH_PROGRAM);
        const treasuryMintPK = new PublicKey(WRAPPED_SOL);
        const tokenProgPK = new PublicKey(TOKEN_PROGRAM);
        const ataProgPK = new PublicKey(ASSOC_TOKEN_PROGRAM);
        const sysProgPK = new PublicKey(SYS_PROGRAM);
        const rentPK = new PublicKey(SYSVAR_RENT);

        const priceLamports = Math.round(listing.price_sol * LAMPORTS_PER_SOL);
        const tokenSize = 1;

        // Seller's token account
        const sellerTokens = await conn.getTokenAccountsByOwner(sellerPK, { mint: mintPK });
        if (!sellerTokens.value.length) {
          await sbDelete("marketplace_listings", { mint: listing.mint });
          delete listings[listing.mint];
          showToast("NFT moved by seller — listing auto-removed", true);
          render(); return;
        }
        const sellerTokenAccPK = sellerTokens.value[0].pubkey;

        // Buyer receipt token account (ATA)
        const [buyerATA] = PublicKey.findProgramAddressSync(
          [buyerPK.toBuffer(), tokenProgPK.toBuffer(), mintPK.toBuffer()], ataProgPK
        );

        // Derive all PDAs
        const authority = await getAHAuthority(conn, PublicKey);
        const [ahFeeAcc] = getAHFeeAccount(PublicKey, ahPK, ahProgPK);
        const [ahTreasury] = getAHTreasury(PublicKey, ahPK, ahProgPK);
        const [escrowPayment, escB] = getBuyerEscrow(PublicKey, ahPK, buyerPK, ahProgPK);
        const [buyerTradeState, btsB] = getBuyerTradeState(PublicKey, buyerPK, ahPK, treasuryMintPK, mintPK, priceLamports, tokenSize, ahProgPK);
        const [sellerTradeState] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, priceLamports, tokenSize, ahProgPK);
        const [freeTradeState, ftsB] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, 0, tokenSize, ahProgPK);
        const [programAsSigner, pasB] = getProgramAsSigner(PublicKey, ahProgPK);
        const [metadataPDA] = getMetadataPDA(PublicKey, mintPK);

        // ① PublicBuy instruction — deposits SOL to escrow + creates buyer trade state
        const buyData = concatBytes(AH_IX.publicBuy, new Uint8Array([btsB, escB]), toLEU64(priceLamports), toLEU64(tokenSize));
        const buyIx = {
          programId: ahProgPK,
          keys: [
            { pubkey: buyerPK, isSigner: true, isWritable: true },
            { pubkey: buyerPK, isSigner: true, isWritable: true }, // payment_account = buyer for SOL
            { pubkey: buyerPK, isSigner: false, isWritable: false }, // transfer_authority
            { pubkey: treasuryMintPK, isSigner: false, isWritable: false },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: false },
            { pubkey: metadataPDA, isSigner: false, isWritable: false },
            { pubkey: escrowPayment, isSigner: false, isWritable: true },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: buyerTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: buyData
        };

        // ② ExecuteSale instruction — atomically swaps NFT ↔ SOL
        const execData = concatBytes(AH_IX.executeSale, new Uint8Array([escB, ftsB, pasB]), toLEU64(priceLamports), toLEU64(tokenSize));
        const execIx = {
          programId: ahProgPK,
          keys: [
            { pubkey: buyerPK, isSigner: true, isWritable: true },
            { pubkey: sellerPK, isSigner: false, isWritable: true },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: true },
            { pubkey: mintPK, isSigner: false, isWritable: false },
            { pubkey: metadataPDA, isSigner: false, isWritable: false },
            { pubkey: treasuryMintPK, isSigner: false, isWritable: false },
            { pubkey: escrowPayment, isSigner: false, isWritable: true },
            { pubkey: sellerPK, isSigner: false, isWritable: true }, // seller_payment_receipt = seller for SOL
            { pubkey: buyerATA, isSigner: false, isWritable: true },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: ahTreasury, isSigner: false, isWritable: true },
            { pubkey: buyerTradeState, isSigner: false, isWritable: true },
            { pubkey: sellerTradeState, isSigner: false, isWritable: true },
            { pubkey: freeTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: ataProgPK, isSigner: false, isWritable: false },
            { pubkey: programAsSigner, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: execData
        };

        const tx = new Transaction().add(buyIx).add(execIx);
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = buyerPK;

        setBtn(`<span class="spinner"></span>SIGN IN WALLET...`, true);
        const signed = await walletProvider.signTransaction(tx);
        setBtn(`<span class="spinner"></span>CONFIRMING...`, true);
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false, maxRetries: 3 });
        showToast("Confirming on-chain...");
        const result = await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");
        if (result.value.err) throw new Error("Transaction failed on-chain");

        // Clean up Supabase
        await sbDelete("marketplace_listings", { mint: listing.mint });
        delete listings[listing.mint];
        await sbDelete("marketplace_offers", { mint: listing.mint });
        delete offers[listing.mint];
        await recordSale({ mint: listing.mint, seller: listing.seller, buyer: walletAddress, price_sol: listing.price_sol, name: listing.name, image: listing.image, tx_sig: sig });

        selectedNft = null;
        await fetchMyNfts();
        showToast("You own it! 🐦 " + listing.name);

      } catch (e) {
        console.error("[buyNft] error:", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        setBtn(`BUY NOW — ◎ ${listing.price_sol} SOL`, false);
      }
    }

    // ─────────────────────────────────────────────
    //  MAKE OFFER (PublicBuy only — deposits SOL to on-chain escrow)
    //  Buyer's SOL is LOCKED until they cancel or seller accepts.
    // ─────────────────────────────────────────────
    async function makeOffer(nft, offerSol) {
      if (!walletAddress || !walletProvider) { showToast("Connect wallet first", true); return; }

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const buyerPK = new PublicKey(walletAddress);
        const mintPK = new PublicKey(nft.mint);
        const ahPK = new PublicKey(AH_ADDRESS);
        const ahProgPK = new PublicKey(AH_PROGRAM);
        const treasuryMintPK = new PublicKey(WRAPPED_SOL);
        const tokenProgPK = new PublicKey(TOKEN_PROGRAM);
        const sysProgPK = new PublicKey(SYS_PROGRAM);
        const rentPK = new PublicKey(SYSVAR_RENT);

        const priceLamports = Math.round(parseFloat(offerSol) * LAMPORTS_PER_SOL);

        // We need the seller's token account — look up from listing or from on-chain
        // For offers on unlisted NFTs, we fetch the current owner's token account
        const ownerAddr = nft.owner || (listings[nft.mint]?.seller);
        if (!ownerAddr) throw new Error("Cannot determine NFT owner");
        const ownerPK = new PublicKey(ownerAddr);
        const ownerTokens = await conn.getTokenAccountsByOwner(ownerPK, { mint: mintPK });
        if (!ownerTokens.value.length) throw new Error("NFT owner's token account not found");
        const sellerTokenAccPK = ownerTokens.value[0].pubkey;

        const authority = await getAHAuthority(conn, PublicKey);
        const [ahFeeAcc] = getAHFeeAccount(PublicKey, ahPK, ahProgPK);
        const [escrowPayment, escB] = getBuyerEscrow(PublicKey, ahPK, buyerPK, ahProgPK);
        const [buyerTradeState, btsB] = getBuyerTradeState(PublicKey, buyerPK, ahPK, treasuryMintPK, mintPK, priceLamports, 1, ahProgPK);
        const [metadataPDA] = getMetadataPDA(PublicKey, mintPK);

        const buyData = concatBytes(AH_IX.publicBuy, new Uint8Array([btsB, escB]), toLEU64(priceLamports), toLEU64(1));
        const buyIx = {
          programId: ahProgPK,
          keys: [
            { pubkey: buyerPK, isSigner: true, isWritable: true },
            { pubkey: buyerPK, isSigner: true, isWritable: true },
            { pubkey: buyerPK, isSigner: false, isWritable: false },
            { pubkey: treasuryMintPK, isSigner: false, isWritable: false },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: false },
            { pubkey: metadataPDA, isSigner: false, isWritable: false },
            { pubkey: escrowPayment, isSigner: false, isWritable: true },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: buyerTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: buyData
        };

        const tx = new Transaction().add(buyIx);
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = buyerPK;

        const signed = await walletProvider.signTransaction(tx);
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        // Save to Supabase
        const obj = { mint: nft.mint, buyer: walletAddress, price_sol: parseFloat(offerSol), name: nft.name, image: nft.image };
        await sbUpsert("marketplace_offers", obj);
        if (!offers[nft.mint]) offers[nft.mint] = [];
        const idx = offers[nft.mint].findIndex(o => o.buyer === walletAddress);
        if (idx >= 0) offers[nft.mint][idx] = obj; else offers[nft.mint].push(obj);
        showToast("Offer placed — " + offerSol + " SOL locked in escrow ✓");
        render();

      } catch (e) {
        console.error("[makeOffer]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Offer failed: " + (e.message || "unknown"), true);
        }
      }
    }

    // ─────────────────────────────────────────────
    //  CANCEL OFFER (Withdraw — returns escrowed SOL to buyer)
    // ─────────────────────────────────────────────
    async function cancelOffer(mint) {
      if (!walletAddress || !walletProvider) return;
      const offer = (offers[mint] || []).find(o => o.buyer === walletAddress);
      if (!offer) { showToast("No offer to cancel", true); return; }

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const buyerPK = new PublicKey(walletAddress);
        const mintPK = new PublicKey(mint);
        const ahPK = new PublicKey(AH_ADDRESS);
        const ahProgPK = new PublicKey(AH_PROGRAM);
        const treasuryMintPK = new PublicKey(WRAPPED_SOL);
        const tokenProgPK = new PublicKey(TOKEN_PROGRAM);
        const ataProgPK = new PublicKey(ASSOC_TOKEN_PROGRAM);
        const sysProgPK = new PublicKey(SYS_PROGRAM);
        const rentPK = new PublicKey(SYSVAR_RENT);

        const priceLamports = Math.round(offer.price_sol * LAMPORTS_PER_SOL);

        // We also need to cancel the buyer trade state (Cancel instruction with buyer's trade state)
        // First cancel the bid, then withdraw
        // Actually for SOL-native AH, we need to:
        // 1. Cancel the bid (closes buyer trade state)
        // 2. Withdraw from escrow

        // For cancel bid, we need the seller token account that was used when the bid was made.
        // We'll look it up from the NFT owner.
        const ownerAddr = listings[mint]?.seller;
        let sellerTokenAccPK;
        if (ownerAddr) {
          const ownerPK = new PublicKey(ownerAddr);
          const ownerTokens = await conn.getTokenAccountsByOwner(ownerPK, { mint: mintPK });
          if (ownerTokens.value.length) sellerTokenAccPK = ownerTokens.value[0].pubkey;
        }

        const authority = await getAHAuthority(conn, PublicKey);
        const [ahFeeAcc] = getAHFeeAccount(PublicKey, ahPK, ahProgPK);
        const [escrowPayment, escB] = getBuyerEscrow(PublicKey, ahPK, buyerPK, ahProgPK);
        const [buyerTradeState] = getBuyerTradeState(PublicKey, buyerPK, ahPK, treasuryMintPK, mintPK, priceLamports, 1, ahProgPK);

        const tx = new Transaction();

        // Cancel the bid (buyer trade state)
        if (sellerTokenAccPK) {
          const cancelData = concatBytes(AH_IX.cancel, toLEU64(priceLamports), toLEU64(1));
          tx.add({
            programId: ahProgPK,
            keys: [
              { pubkey: buyerPK, isSigner: true, isWritable: true },
              { pubkey: sellerTokenAccPK, isSigner: false, isWritable: true },
              { pubkey: mintPK, isSigner: false, isWritable: false },
              { pubkey: authority, isSigner: false, isWritable: false },
              { pubkey: ahPK, isSigner: false, isWritable: false },
              { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
              { pubkey: buyerTradeState, isSigner: false, isWritable: true },
              { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            ],
            data: cancelData
          });
        }

        // Withdraw from escrow
        const withdrawData = concatBytes(AH_IX.withdraw, new Uint8Array([escB]), toLEU64(priceLamports));
        tx.add({
          programId: ahProgPK,
          keys: [
            { pubkey: buyerPK, isSigner: true, isWritable: true }, // wallet
            { pubkey: buyerPK, isSigner: false, isWritable: true }, // receipt_account
            { pubkey: escrowPayment, isSigner: false, isWritable: true },
            { pubkey: treasuryMintPK, isSigner: false, isWritable: false },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: ataProgPK, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: withdrawData
        });

        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = buyerPK;

        const signed = await walletProvider.signTransaction(tx);
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        await sbDelete("marketplace_offers", { mint, buyer: walletAddress });
        if (offers[mint]) offers[mint] = offers[mint].filter(o => o.buyer !== walletAddress);
        showToast("Offer cancelled — SOL returned ✓");
        render();

      } catch (e) {
        console.error("[cancelOffer]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
      }
    }

    // ─────────────────────────────────────────────
    //  ACCEPT OFFER (ExecuteSale — seller signs, buyer's escrowed SOL moves)
    //  Buyer does NOT need to be online. SOL is already locked in escrow.
    // ─────────────────────────────────────────────
    async function acceptOffer(offerData) {
      if (!walletAddress || !walletProvider) return;

      const btn = document.getElementById(`accept-${offerData.buyer.slice(0, 6)}`);
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`; }

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const sellerPK = new PublicKey(walletAddress);
        const buyerPK = new PublicKey(offerData.buyer);
        const mintPK = new PublicKey(offerData.mint);
        const ahPK = new PublicKey(AH_ADDRESS);
        const ahProgPK = new PublicKey(AH_PROGRAM);
        const treasuryMintPK = new PublicKey(WRAPPED_SOL);
        const tokenProgPK = new PublicKey(TOKEN_PROGRAM);
        const ataProgPK = new PublicKey(ASSOC_TOKEN_PROGRAM);
        const sysProgPK = new PublicKey(SYS_PROGRAM);
        const rentPK = new PublicKey(SYSVAR_RENT);

        const priceLamports = Math.round(offerData.price_sol * LAMPORTS_PER_SOL);

        const sellerTokens = await conn.getTokenAccountsByOwner(sellerPK, { mint: mintPK });
        if (!sellerTokens.value.length) throw new Error("NFT not in your wallet");
        const sellerTokenAccPK = sellerTokens.value[0].pubkey;

        const [buyerATA] = PublicKey.findProgramAddressSync(
          [buyerPK.toBuffer(), tokenProgPK.toBuffer(), mintPK.toBuffer()], ataProgPK
        );

        const authority = await getAHAuthority(conn, PublicKey);
        const [ahFeeAcc] = getAHFeeAccount(PublicKey, ahPK, ahProgPK);
        const [ahTreasury] = getAHTreasury(PublicKey, ahPK, ahProgPK);
        const [escrowPayment, escB] = getBuyerEscrow(PublicKey, ahPK, buyerPK, ahProgPK);
        const [buyerTradeState] = getBuyerTradeState(PublicKey, buyerPK, ahPK, treasuryMintPK, mintPK, priceLamports, 1, ahProgPK);

        // The seller needs a listing (trade state) on-chain to match.
        // If the NFT is listed at a different price, we need to create a free listing first.
        // For accept-offer, we create a "sell" at the offer price, then executeSale.
        const [sellerTradeState, stsB] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, priceLamports, 1, ahProgPK);
        const [freeTradeState, ftsB] = getSellerTradeState(PublicKey, sellerPK, ahPK, sellerTokenAccPK, treasuryMintPK, mintPK, 0, 1, ahProgPK);
        const [programAsSigner, pasB] = getProgramAsSigner(PublicKey, ahProgPK);
        const [metadataPDA] = getMetadataPDA(PublicKey, mintPK);

        const tx = new Transaction();

        // ① Sell instruction at the offer price (creates seller trade state to match)
        const sellData = concatBytes(AH_IX.sell, new Uint8Array([stsB, ftsB, pasB]), toLEU64(priceLamports), toLEU64(1));
        tx.add({
          programId: ahProgPK,
          keys: [
            { pubkey: sellerPK, isSigner: true, isWritable: true },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: true },
            { pubkey: metadataPDA, isSigner: false, isWritable: false },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: sellerTradeState, isSigner: false, isWritable: true },
            { pubkey: freeTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: programAsSigner, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: sellData
        });

        // ② ExecuteSale
        const execData = concatBytes(AH_IX.executeSale, new Uint8Array([escB, ftsB, pasB]), toLEU64(priceLamports), toLEU64(1));
        tx.add({
          programId: ahProgPK,
          keys: [
            { pubkey: buyerPK, isSigner: false, isWritable: true },
            { pubkey: sellerPK, isSigner: true, isWritable: true },
            { pubkey: sellerTokenAccPK, isSigner: false, isWritable: true },
            { pubkey: mintPK, isSigner: false, isWritable: false },
            { pubkey: metadataPDA, isSigner: false, isWritable: false },
            { pubkey: treasuryMintPK, isSigner: false, isWritable: false },
            { pubkey: escrowPayment, isSigner: false, isWritable: true },
            { pubkey: sellerPK, isSigner: false, isWritable: true },
            { pubkey: buyerATA, isSigner: false, isWritable: true },
            { pubkey: authority, isSigner: false, isWritable: false },
            { pubkey: ahPK, isSigner: false, isWritable: false },
            { pubkey: ahFeeAcc, isSigner: false, isWritable: true },
            { pubkey: ahTreasury, isSigner: false, isWritable: true },
            { pubkey: buyerTradeState, isSigner: false, isWritable: true },
            { pubkey: sellerTradeState, isSigner: false, isWritable: true },
            { pubkey: freeTradeState, isSigner: false, isWritable: true },
            { pubkey: tokenProgPK, isSigner: false, isWritable: false },
            { pubkey: sysProgPK, isSigner: false, isWritable: false },
            { pubkey: ataProgPK, isSigner: false, isWritable: false },
            { pubkey: programAsSigner, isSigner: false, isWritable: false },
            { pubkey: rentPK, isSigner: false, isWritable: false },
          ],
          data: execData
        });

        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = sellerPK;

        const signed = await walletProvider.signTransaction(tx);
        showToast("Confirming...");
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        // Clean up
        await sbDelete("marketplace_listings", { mint: offerData.mint });
        await sbDelete("marketplace_offers", { mint: offerData.mint });
        delete listings[offerData.mint];
        delete offers[offerData.mint];
        await recordSale({ mint: offerData.mint, seller: walletAddress, buyer: offerData.buyer, price_sol: offerData.price_sol, name: offerData.name, image: offerData.image, tx_sig: sig });

        selectedNft = null;
        await fetchMyNfts();
        showToast("Sold! SOL received. 🐦");

      } catch (e) {
        console.error("[acceptOffer]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        if (btn) { btn.disabled = false; btn.innerHTML = "ACCEPT"; }
      }
    }

    // ─────────────────────────────────────────────
    //  HELIUS
    // ─────────────────────────────────────────────
    function parseAsset(item) {
      const meta = item.content?.metadata || {};
      const files = item.content?.files || [];
      const links = item.content?.links || {};
      const img = links.image || files[0]?.cdn_uri || files[0]?.uri || "";
      return { mint: item.id, name: meta.name || "Long Neck Legend", image: img, attributes: meta.attributes || [], owner: item.ownership?.owner || "" };
    }

    async function fetchPage(pg) {
      // Nothing to fetch — listings loaded by loadMarketData() at init
      // and refreshed whenever a listing is added/removed.

      if (!walletAddress) return;
      myNfts = []; render();
      try {
        let pg = 1, all = [];
        while (true) {
          const res = await fetch(RPC, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              jsonrpc: "2.0", id: "my", method: "getAssetsByOwner",
              params: {
                ownerAddress: walletAddress, page: pg, limit: 1000,
                displayOptions: { showUnverifiedCollections: true }
              }
            })
          });
          const data = await res.json();
          if (data.error) break;
          const items = data.result?.items || [];
          all = all.concat(items);
          if (items.length < 1000) break;
          pg++;
        }
        myNfts = all.filter(item => {
          if ((item.grouping || []).some(g => g.group_value === COLLECTION)) return true;
          if ((item.content?.metadata?.name || "").toLowerCase().startsWith("long neck legend")) return true;
          if ((item.creators || []).some(c => c.address === COLLECTION)) return true;
          return false;
        }).map(parseAsset);

      }
      if (!myNfts.length) {
        app.innerHTML += `<div style="text-align:center;padding:40px;color:var(--g2)">
      <div style="margin-bottom:10px">No Long Neck Legends in this wallet</div>
      <div style="font-size:9px;color:var(--g3)">${short(walletAddress, 8, 6)}</div>
    </div>`; return;
      }
      app.innerHTML += `<div style="padding:10px 16px;font-size:10px;color:var(--g2)">${myNfts.length} Long Neck${myNfts.length !== 1 ? "s" : ""} in ${short(walletAddress, 6, 4)}</div>`;
      let grid = `<div class="nft-grid">`;
      myNfts.forEach((nft, i) => {
        const listing = listings[nft.mint];
        grid += `<div class="nft-card" data-mint="${nft.mint}" style="animation:up .35s ease ${i * .05}s both">
      <div class="nft-img-wrap" style="height:200px">
        ${nft.image ? `<img src="${nft.image}" alt="${nft.name}" loading="lazy" class="nft-img" onerror="this.style.display='none'">` : ""}
        ${listing ? `<div class="listed-badge">◎ ${listing.price_sol}</div>` : ""}
      </div>
      <div class="nft-info">
        <div class="nft-name">${nft.name}</div>
        ${listing ? `<div class="price-tag">◎ ${listing.price_sol} SOL</div>` : `<div style="font-size:9px;color:var(--g2);margin-top:3px">NOT LISTED</div>`}
      </div>
    </div>`;
      });
      app.innerHTML += grid + `</div>`;
      setTimeout(() => {
        document.querySelectorAll("[data-mint]").forEach(card => {
          card.onclick = () => { selectedNft = myNfts.find(n => n.mint === card.dataset.mint); render(); };
        });
      }, 0);
    }

    // ─────────────────────────────────────────────
    //  NFT DETAIL MODAL
    // ─────────────────────────────────────────────
    function renderModal() {
      if (!selectedNft) return;
      const nft = selectedNft;
      const yours = walletAddress && nft.owner === walletAddress;
      const listing = listings[nft.mint];
      const nftOffers = (offers[nft.mint] || []).sort((a, b) => b.price_sol - a.price_sol);
      const myOffer = nftOffers.find(o => o.buyer === walletAddress);

      const ov = document.createElement("div");
      ov.className = "modal-bg";
      ov.onclick = e => { if (e.target === ov) { selectedNft = null; render(); } };

      let traitsHtml = "";
      if (nft._loading) {
        traitsHtml = `<div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--g2);letter-spacing:2px;margin-bottom:8px">TRAITS</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${[1, 2, 3, 4].map(() => `<div class="sk" style="height:24px;width:80px;border-radius:6px"></div>`).join("")}</div>
    </div>`;
      } else if (nft.attributes?.length) {
        traitsHtml = `<div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--g2);letter-spacing:2px;margin-bottom:6px">TRAITS</div>
      <div>${nft.attributes.map(a => `<span class="trait"><span style="color:var(--g2)">${a.trait_type}: </span><span style="color:var(--g1)">${a.value}</span></span>`).join("")}</div>
    </div>`;
      }

      // Offers panel for owner
      let offersHtml = "";
      if (yours && nftOffers.length) {
        offersHtml = `<div class="divider"></div>
      <div style="font-size:10px;color:var(--g2);letter-spacing:2px;margin-bottom:8px">OFFERS (${nftOffers.length})</div>`;
        nftOffers.forEach(o => {
          const safeOffer = JSON.stringify({ mint: o.mint, buyer: o.buyer, price_sol: o.price_sol, name: o.name || "", image: o.image || "" });
          offersHtml += `<div class="offer-row">
        <div>
          <div style="font-size:13px;color:#fff;font-family:var(--d);letter-spacing:2px">◎ ${o.price_sol} SOL</div>
          <div style="font-size:9px;color:var(--g2);margin-top:2px">${short(o.buyer, 6, 4)}</div>
        </div>
        <button class="btn-green" id="accept-${o.buyer.slice(0, 6)}" style="width:auto;padding:6px 14px;font-size:12px"
          onclick='acceptOffer(${safeOffer.replace(/'/g, "&#39;")})'>ACCEPT</button>
      </div>`;
        });
      }

      // My offer status for buyer
      let myOfferHtml = "";
      if (!yours && myOffer) {
        myOfferHtml = `<div style="padding:8px 12px;background:var(--rb);border:1px solid rgba(255,0,60,.15);border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:9px;color:var(--r);letter-spacing:2px">YOUR OFFER: ◎ ${myOffer.price_sol} SOL</span>
      <button class="btn-danger" style="padding:4px 10px;font-size:10px" onclick="cancelOffer('${nft.mint}')">CANCEL</button>
    </div>`;
      }

      // Action buttons
      let actions = "";
      if (!walletAddress) {
        actions = `<button class="wallet-btn" style="width:100%;justify-content:center" onclick="showWalletPicker()"><span>👛</span> CONNECT TO TRADE</button>`;
      } else if (yours) {
        actions = `<button class="btn-primary" id="list-btn">${listing ? "MANAGE LISTING" : "LIST FOR SALE"}</button>`;
      } else {
        actions = `<div style="display:flex;gap:8px">
      ${listing
            ? `<button class="btn-green" style="flex:2" id="buy-btn">BUY NOW — ◎ ${listing.price_sol} SOL</button>`
            : `<div style="flex:2;padding:12px;background:#060606;border:1px solid #161616;border-radius:8px;font-size:10px;color:var(--g2);display:flex;align-items:center;justify-content:center">NOT LISTED</div>`}
      <button class="btn-ghost" style="flex:1;white-space:nowrap" id="offer-btn">MAKE OFFER</button>
    </div>`;
      }

      ov.innerHTML = `<div class="modal" style="max-width:860px" onclick="event.stopPropagation()">
    <button class="modal-close" id="close-modal">✕</button>
    <div style="flex:1 1 340px;min-height:300px;background:#030303;display:flex;align-items:center;justify-content:center">
      ${nft.image ? `<img src="${nft.image}" alt="${nft.name}" style="width:100%;height:100%;object-fit:contain;max-height:460px">` : `<span style="font-size:52px;opacity:.1">🐦</span>`}
    </div>
    <div style="flex:1 1 320px;padding:26px;min-width:260px;display:flex;flex-direction:column">
      <h2 style="font-family:var(--d);font-size:28px;color:#fff;letter-spacing:3px;line-height:1;margin-bottom:8px">${nft.name}</h2>
      <div style="font-size:10px;color:var(--g2);margin-bottom:${listing ? '6px' : '14px'}">
        Owner: <span style="color:var(--g1)">${short(nft.owner, 8, 6)}</span>
        ${yours ? `<span class="tg" style="margin-left:6px;background:var(--grna);color:var(--grn)">YOU</span>` : ""}
      </div>
      ${listing ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:12px 14px;background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.12);border-radius:8px">
        <span style="font-family:var(--d);font-size:24px;color:var(--grn);letter-spacing:2px">◎ ${listing.price_sol} SOL</span>
        <span style="font-size:9px;color:var(--g2);margin-left:auto">Seller gets ${(listing.price_sol * (1 - FEE_PCT)).toFixed(4)} SOL</span>
      </div>`: ""}
      ${traitsHtml}
      ${myOfferHtml}
      ${actions}
      ${offersHtml}
      <div style="font-size:8px;color:var(--g3);margin-top:14px;word-break:break-all;line-height:1.6">Mint: ${nft.mint}</div>
    </div>
  </div>`;

      document.getElementById("app").appendChild(ov);
      document.getElementById("close-modal").onclick = () => { selectedNft = null; render(); };
      document.getElementById("list-btn")?.addEventListener("click", () => { ov.remove(); showListingModal(nft); });
      document.getElementById("buy-btn")?.addEventListener("click", () => {
        console.log("[BUY] clicked — listing:", listing, "wallet:", walletAddress, "provider:", !!walletProvider);
        if (!listing) { console.error("[BUY] no listing object"); return; }
        if (!walletAddress) { showWalletPicker(); return; }
        buyNft(listing);
      });
      document.getElementById("offer-btn")?.addEventListener("click", () => { ov.remove(); showOfferModal(nft); });
    }

    // ─────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", async () => {
      await computeDiscriminators();
      await loadMarketData();
      fetchPage(1);
    });
  </script>
</body>

</html>
