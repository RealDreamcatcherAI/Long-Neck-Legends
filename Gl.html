<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace | Long Neck Legends</title>
  <meta name="description" content="Buy, sell, and trade Long Neck Legends NFTs peer-to-peer on Solana.">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Permanent+Marker&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #040404;
      --card: #0b0b0b;
      --bdr: #141414;
      --r: #FF003C;
      --ra: rgba(255, 0, 60, .18);
      --rb: rgba(255, 0, 60, .06);
      --grn: #00FF88;
      --grna: rgba(0, 255, 136, .12);
      --w: #eee;
      --g1: #999;
      --g2: #666;
      --g3: #444;
      --f: 'Space Mono', monospace;
      --d: 'Bebas Neue', sans-serif;
      --m: 'Permanent Marker', cursive
    }

    body {
      background: var(--bg);
      color: var(--w);
      font-family: var(--f);
      overflow-x: hidden
    }

    a {
      color: var(--r);
      text-decoration: none
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: #060606
    }

    ::-webkit-scrollbar-thumb {
      background: var(--r);
      border-radius: 3px
    }

    @keyframes up {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes glow {

      0%,
      100% {
        text-shadow: 0 0 6px rgba(255, 0, 60, .4)
      }

      50% {
        text-shadow: 0 0 18px rgba(255, 0, 60, .6)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .6
      }

      50% {
        opacity: 1
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    @keyframes scroll {
      from {
        transform: translateX(0)
      }

      to {
        transform: translateX(-50%)
      }
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(4, 4, 4, .96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #111
    }

    .site-nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--r);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      box-shadow: 0 0 10px var(--ra)
    }

    .logo span {
      font-family: var(--d);
      font-size: 17px;
      letter-spacing: 4px;
      color: #fff
    }

    .nav-links {
      display: flex;
      gap: 3px;
      flex-wrap: wrap
    }

    .nav-links a {
      padding: 7px 12px;
      border-radius: 6px;
      font-family: var(--d);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--g1);
      border: 1px solid transparent;
      transition: all .2s
    }

    .nav-links a:hover {
      color: var(--r);
      background: var(--rb)
    }

    .nav-links a.active {
      color: var(--r);
      background: var(--rb);
      border-color: rgba(255, 0, 60, .2)
    }

    .ticker {
      background: var(--r);
      padding: 3px 0;
      overflow: hidden;
      white-space: nowrap
    }

    .ticker-inner {
      display: inline-block;
      animation: scroll 30s linear infinite
    }

    .ticker span {
      font-family: var(--f);
      font-size: 10px;
      color: #000;
      font-weight: 700;
      letter-spacing: 1px
    }

    .nft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 14px;
      padding: 0 16px 30px;
      max-width: 1400px;
      margin: 0 auto
    }

    .nft-card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all .3s;
      position: relative
    }

    .nft-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 28px var(--ra), 0 14px 36px rgba(0, 0, 0, .6);
      border-color: rgba(255, 0, 60, .22)
    }

    .nft-card:hover .nft-img {
      transform: scale(1.05)
    }

    .nft-img-wrap {
      height: 220px;
      background: #030303;
      overflow: hidden;
      position: relative
    }

    .nft-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease
    }

    .nft-info {
      padding: 10px 12px 12px
    }

    .nft-name {
      font-family: var(--d);
      font-size: 13px;
      color: #fff;
      letter-spacing: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .nft-owner {
      font-size: 9px;
      color: var(--g2);
      margin-top: 3px
    }

    .yours-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      background: var(--grna);
      border: 1px solid rgba(0, 255, 136, .2);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 8px;
      color: var(--grn);
      font-weight: 700
    }

    .listed-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      background: rgba(0, 0, 0, .75);
      border: 1px solid rgba(0, 255, 136, .3);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 9px;
      color: var(--grn);
      font-weight: 700;
      backdrop-filter: blur(4px)
    }

    .price-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 5px;
      font-family: var(--d);
      font-size: 14px;
      color: var(--grn);
      letter-spacing: 1px
    }

    .sk {
      background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px
    }

    .btn-primary {
      padding: 12px 24px;
      background: var(--r);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--d);
      font-size: 15px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 12px var(--ra);
      transition: all .2s;
      text-align: center;
      width: 100%
    }

    .btn-primary:hover {
      box-shadow: 0 0 24px rgba(255, 0, 60, .4)
    }

    .btn-primary:disabled {
      opacity: .4;
      cursor: not-allowed;
      box-shadow: none
    }

    .btn-green {
      padding: 12px 24px;
      background: #00c96a;
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--d);
      font-size: 15px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 12px var(--grna);
      transition: all .2s;
      text-align: center;
      width: 100%;
      font-weight: 700
    }

    .btn-green:hover {
      box-shadow: 0 0 24px rgba(0, 255, 136, .4)
    }

    .btn-green:disabled {
      opacity: .4;
      cursor: not-allowed;
      box-shadow: none
    }

    .btn-ghost {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(255, 0, 60, .2);
      color: var(--r);
      border-radius: 8px;
      font-family: var(--d);
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s;
      text-align: center
    }

    .btn-ghost:hover {
      background: var(--rb)
    }

    .btn-ghost:disabled {
      opacity: .3;
      cursor: not-allowed
    }

    .btn-danger {
      padding: 10px 14px;
      background: transparent;
      border: 1px solid rgba(255, 0, 60, .35);
      color: var(--r);
      border-radius: 8px;
      font-family: var(--d);
      font-size: 12px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all .2s
    }

    .btn-danger:hover {
      background: rgba(255, 0, 60, .1)
    }

    .wallet-btn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #AB47FF, #7C3AED);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--d);
      font-size: 12px;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(124, 58, 237, .2);
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .wallet-btn:hover {
      box-shadow: 0 0 22px rgba(124, 58, 237, .4)
    }

    .conn-btn {
      padding: 7px 12px;
      background: rgba(0, 255, 136, .06);
      border: 1px solid rgba(0, 255, 136, .18);
      border-radius: 10px;
      color: var(--grn);
      font-family: var(--f);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .dot-sm {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--grn);
      animation: pulse 2s infinite;
      display: inline-block
    }

    .input {
      padding: 10px 14px;
      background: #080808;
      border: 1px solid #1c1c1c;
      border-radius: 8px;
      color: var(--w);
      font-family: var(--f);
      font-size: 12px;
      outline: none;
      width: 100%
    }

    .input:focus {
      border-color: var(--r)
    }

    .neon {
      color: var(--r);
      animation: glow 3s ease-in-out infinite
    }

    .stat-card {
      text-align: center;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      min-width: 85px
    }

    .tab-btn {
      padding: 8px 18px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--g2);
      font-family: var(--d);
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all .2s
    }

    .tab-btn.active {
      color: var(--r);
      background: var(--rb);
      border-color: rgba(255, 0, 60, .2)
    }

    .tg {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
      font-weight: 700
    }

    .trait {
      background: var(--rb);
      border: 1px solid rgba(255, 0, 60, .08);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 10px;
      display: inline-block;
      margin: 2px
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .92);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(14px);
      animation: fade .15s;
      padding: 14px
    }

    .modal {
      background: linear-gradient(145deg, #0c0c0c, #080808);
      border: 1px solid #1c1c1c;
      border-radius: 16px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      overflow: hidden;
      max-height: 92vh;
      overflow-y: auto;
      position: relative
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: var(--rb);
      border: 1px solid var(--r);
      color: var(--r);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: grid;
      place-items: center
    }

    .offer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #0a0a0a;
      border: 1px solid #181818;
      border-radius: 8px;
      margin-bottom: 6px
    }

    .divider {
      height: 1px;
      background: #161616;
      margin: 14px 0
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      background: var(--grn);
      color: #000;
      padding: 10px 24px;
      border-radius: 8px;
      font-family: var(--d);
      font-size: 14px;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px var(--grna);
      animation: up .25s;
      white-space: nowrap
    }

    .toast.err {
      background: var(--r);
      color: #fff;
      box-shadow: 0 4px 20px var(--ra)
    }

    /* Activity Bar */
    .activity-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 500;
      background: rgba(6, 6, 6, .97);
      border-top: 1px solid #1a1a1a;
      backdrop-filter: blur(20px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1)
    }

    .activity-bar.open {
      transform: translateY(0)
    }

    .activity-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 6px;
      border-bottom: 1px solid #111
    }

    .activity-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 16px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--r) transparent
    }

    .activity-scroll::-webkit-scrollbar {
      height: 3px
    }

    .activity-scroll::-webkit-scrollbar-thumb {
      background: var(--r);
      border-radius: 2px
    }

    .activity-item {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: transform .15s
    }

    .activity-item:hover {
      transform: translateY(-2px)
    }

    .activity-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: #111;
      border: 1px solid #1c1c1c
    }

    .activity-price {
      font-family: var(--d);
      font-size: 12px;
      color: var(--grn);
      letter-spacing: 1px
    }

    .activity-time {
      font-size: 9px;
      color: var(--g2)
    }

    /* Filter Panel */
    .filter-panel {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 600;
      width: min(320px, 90vw);
      background: #060606;
      border-right: 1px solid #1a1a1a;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1)
    }

    .filter-panel.open {
      transform: translateX(0)
    }

    .filter-overlay {
      position: fixed;
      inset: 0;
      z-index: 599;
      background: rgba(0, 0, 0, .6);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s
    }

    .filter-overlay.open {
      opacity: 1;
      pointer-events: all
    }

    .filter-trait-group {
      margin-bottom: 14px
    }

    .filter-trait-group summary {
      font-family: var(--d);
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--g1);
      cursor: pointer;
      padding: 8px 0;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .filter-trait-group summary::-webkit-details-marker {
      display: none
    }

    .filter-val {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
      font-size: 10px;
      color: var(--g2)
    }

    .filter-val:hover {
      color: var(--w)
    }

    .filter-val input {
      accent-color: var(--r);
      width: 14px;
      height: 14px;
      cursor: pointer
    }

    .filter-val.active {
      color: var(--w)
    }

    /* Tool buttons */
    .tool-btn {
      padding: 7px 12px;
      background: #0a0a0a;
      border: 1px solid #1c1c1c;
      border-radius: 8px;
      color: var(--g1);
      font-family: var(--d);
      font-size: 11px;
      letter-spacing: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .2s;
      white-space: nowrap
    }

    .tool-btn:hover {
      border-color: rgba(255, 0, 60, .3);
      color: var(--w)
    }

    .tool-btn.active {
      border-color: rgba(255, 0, 60, .4);
      color: var(--r);
      background: var(--rb)
    }

    /* Cabbage & Leaderboard */
    .cabbage-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(0, 200, 0, .06);
      border: 1px solid rgba(0, 200, 0, .15);
      border-radius: 20px;
      font-family: var(--d);
      font-size: 12px;
      color: #4ade80;
      letter-spacing: 1px;
      cursor: default
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      margin-bottom: 6px;
      transition: all .2s
    }

    .lb-row:hover {
      border-color: rgba(255, 0, 60, .15)
    }

    .lb-row.you {
      border-color: rgba(0, 255, 136, .25);
      background: rgba(0, 255, 136, .03)
    }

    .lb-rank {
      font-family: var(--d);
      font-size: 20px;
      color: var(--g2);
      min-width: 30px;
      text-align: center;
      letter-spacing: 1px
    }

    .lb-rank.gold { color: #ffd700 }
    .lb-rank.silver { color: #c0c0c0 }
    .lb-rank.bronze { color: #cd7f32 }

    .streak-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(255, 165, 0, .04);
      border: 1px solid rgba(255, 165, 0, .12);
      border-radius: 8px;
      margin-bottom: 14px
    }

    .streak-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #222;
      border: 1px solid #333;
      transition: all .3s
    }

    .streak-dot.lit {
      background: #ffa500;
      border-color: #ffa500;
      box-shadow: 0 0 6px rgba(255, 165, 0, .5)
    }

    .featured-banner {
      margin: 0 16px 14px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(255, 215, 0, .04), rgba(255, 0, 60, .04));
      border: 1px solid rgba(255, 215, 0, .15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all .3s
    }

    .featured-banner:hover {
      border-color: rgba(255, 215, 0, .3);
      box-shadow: 0 0 20px rgba(255, 215, 0, .06)
    }

    .winner-banner {
      padding: 12px 18px;
      background: linear-gradient(135deg, rgba(255, 215, 0, .06), transparent);
      border: 1px solid rgba(255, 215, 0, .12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px
    }

    /* Trade Tab */
    .trade-card {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      transition: all .3s;
      position: relative;
      overflow: hidden
    }

    .trade-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--r), transparent);
      opacity: .4
    }

    .trade-card:hover {
      border-color: rgba(255, 0, 60, .18);
      box-shadow: 0 4px 24px rgba(0, 0, 0, .4)
    }

    .trade-card.incoming::before {
      background: linear-gradient(90deg, transparent, var(--grn), transparent)
    }

    .trade-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--r);
      padding: 6px 0;
      opacity: .6;
      font-family: var(--d);
      letter-spacing: 6px
    }

    .trade-side {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap
    }

    .trade-nft-thumb {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #1c1c1c;
      background: #111;
      flex-shrink: 0
    }

    .trade-nft-info {
      flex: 1;
      min-width: 0
    }

    .trade-status {
      display: inline-flex;
      align-items: center;

    // ── Compressed NFT Marketplace (Bubblegum + Escrow Co-signer) ──
    const ESCROW_ADDRESS = "BRveonSzDfxYzmmTxpEdHndajfBTBLjz3bwatJGLSxii"; // from generate-escrow.mjs
    const COSIGN_URL = "https://hypqndasopdkrqvkllvc.supabase.co/functions/v1/marketplace-cosign";

    const COMPRESSION_PROGRAM = "cmtDvXumGCrqC1Age74AVPhSRVXJMd8PJS91L8KbNCK";
    const NOOP_PROGRAM = "noopb9bkMVfRPU8AsbpTUg8AQkHtKwMYZiFUjNRtMmV";

    let BG_IX = {}; // Bubblegum instruction discriminators
    // ═══════════════════════════════════════════════════════════

    // ── State ──

    let allTraits = {}; // { LNL: { "Background": Set([...]) }, GA: { "Ball": Set([...]) } }
    let traitsLoaded = false, traitsLoading = false;

    let traitIndex = {}; // mint -> { traitType: value } — built during loadTraits
    let collectionByMint = {}; // mint -> "LNL" | "GA"
    let supplyByCollection = { ...SUPPLY_BY_COLLECTION };

    // ── Trade State ──

    let tradeSubTab = "live"; // "live" | "incoming" | "outgoing" | "history"

    let myPoints = null; // { total_points, weekly_points, current_streak, last_action_date }
    let weeklyWinner = null; // last week's winner

    let recentActivity = []; // last 20 global actions

    const short = (a, s = 4, e = 4) => a ? `${a.slice(0, s)}...${a.slice(-e)}` : "";
    const getCollectionConfig = key => COLLECTIONS[key] || null;
    const getCollectionLabel = key => key === "all" ? "ALL COLLECTIONS" : (getCollectionConfig(key)?.label || "UNKNOWN COLLECTION");
    const getCollectionShortLabel = key => key === "all" ? "ALL" : (getCollectionConfig(key)?.shortLabel || key || "NFT");
    const getCollectionMint = key => getCollectionConfig(key)?.mint || "";
    const detectCollectionKey = item => {
      const grouped = (item.grouping || []).find(g => g.group_key === "collection" && COLLECTION_KEYS.some(key => g.group_value === COLLECTIONS[key].mint));
      if (grouped) return COLLECTION_KEYS.find(key => COLLECTIONS[key].mint === grouped.group_value) || null;
      const name = (item.content?.metadata?.name || item.name || "").toLowerCase();
      if (name.startsWith("long neck legend")) return "LNL";
      if (name.includes("golf addict")) return "GA";
      if ((item.creators || []).some(c => COLLECTION_KEYS.some(key => c.address === COLLECTIONS[key].mint))) {
        return COLLECTION_KEYS.find(key => (item.creators || []).some(c => c.address === COLLECTIONS[key].mint)) || null;
      }
      return collectionByMint[item.id] || null;
    };

    // ─────────────────────────────────────────────
    //  SUPABASE
    // ─────────────────────────────────────────────
    const SB_HDR = { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json" };

    async function sbGet(path) {
      const r = await fetch(`${SB_URL}/rest/v1/${path}`, { headers: SB_HDR });
      return r.json();
    }
    async function sbUpsert(table, body) {
      const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
        method: "POST",
        headers: { ...SB_HDR, Prefer: "resolution=merge-duplicates,return=representation" },
        body: JSON.stringify(body)
      });
      return r.json();
    }
    async function sbDelete(table, match) {
      const qs = Object.entries(match).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&");
      await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, { method: "DELETE", headers: SB_HDR });
    }

    async function loadMarketData() {
      try {
        const [ls, os, sv, tr] = await Promise.all([
          sbGet("marketplace_listings?select=*"),
          sbGet("marketplace_offers?select=*"),
          sbGet("marketplace_sales?select=price_sol,name,image,sold_at&order=sold_at.desc&limit=50"),
          sbGet("marketplace_trades?select=*&order=created_at.desc&limit=200")
        ]);
        listings = {};
        (Array.isArray(ls) ? ls : []).forEach(l => { listings[l.mint] = l; });
        offers = {};
        (Array.isArray(os) ? os : []).forEach(o => {
          if (!offers[o.mint]) offers[o.mint] = [];
          offers[o.mint].push(o);
        });
        const sales = Array.isArray(sv) ? sv : [];
        totalVolume = sales.reduce((sum, s) => sum + parseFloat(s.price_sol || 0), 0);
        recentSales = sales; // already limited to 50 by query
        trades = Array.isArray(tr) ? tr : [];
      } catch (e) { console.error("loadMarketData:", e); }
      // Load cabbage data (non-blocking)
      loadCabbageData();
    }

    // ─────────────────────────────────────────────
    //  CABBAGE REWARDS
    // ─────────────────────────────────────────────
    async function loadCabbageData() {
      try {
        const [lb, act, feat, resetResult] = await Promise.all([
          sbGet("marketplace_points?select=wallet,total_points,weekly_points,current_streak&order=weekly_points.desc&limit=25"),
          sbGet("marketplace_activity?select=wallet,action_type,points,details,created_at&order=created_at.desc&limit=20"),
          cosign({ action: "pick-featured" }).catch(() => null),
          cosign({ action: "check-weekly-reset" }).catch(() => null),
        ]);
        leaderboard = Array.isArray(lb) ? lb : [];
        recentActivity = Array.isArray(act) ? act : [];
        if (feat?.featured) featuredListing = feat.featured;

        // Weekly winner — check reset result first, fall back to DB query
        if (resetResult?.winner) {
          weeklyWinner = resetResult.winner;
        } else {
          const winners = await sbGet("marketplace_weekly_winners?select=*&order=week_start.desc&limit=1");
          weeklyWinner = Array.isArray(winners) && winners.length ? winners[0] : null;
        }

        // Load my points if connected
        if (walletAddress) {
          const mp = await sbGet(`marketplace_points?wallet=eq.${walletAddress}&select=*`);
          myPoints = Array.isArray(mp) && mp.length ? mp[0] : null;
        }
        render();
      } catch (e) { console.error("[cabbage] load failed:", e); }
    }

    async function awardListPoints(mint) {
      if (!walletAddress) return;
      try {
        await cosign({ action: "award-list-points", wallet: walletAddress, mint });
        // Refresh points
        const mp = await sbGet(`marketplace_points?wallet=eq.${walletAddress}&select=*`);
        myPoints = Array.isArray(mp) && mp.length ? mp[0] : null;
      } catch (e) { console.error("[cabbage] list points failed:", e); }
    }

    const ACTION_LABELS = {
      list: "LISTED",
      buy: "BOUGHT",
      sell: "SOLD",
      trade_propose: "TRADED",
      trade_accept: "TRADED",
      streak_bonus: "STREAK 🔥"
    };

    // ─────────────────────────────────────────────
    //  ACTIVITY BAR
    // ─────────────────────────────────────────────
    function timeAgo(isoStr) {
      const s = Math.floor((Date.now() - new Date(isoStr)) / 1000);
      if (s < 60) return s + "s ago";
      if (s < 3600) return Math.floor(s / 60) + "m ago";
      if (s < 86400) return Math.floor(s / 3600) + "h ago";
      return Math.floor(s / 86400) + "d ago";
    }

    function openActivity() {
      const bar = document.getElementById("activity-bar");
      if (!bar) return;
      // Toggle — close if already open
      if (bar.classList.contains("open")) { bar.classList.remove("open"); return; }
      const scroll = document.getElementById("activity-scroll");
      const count = document.getElementById("activity-count");
      count.textContent = recentSales.length ? `${recentSales.length} sales` : "";
      if (!recentSales.length) {
        scroll.innerHTML = `<div style="color:var(--g2);font-size:10px;padding:10px 4px;white-space:nowrap">No sales yet — be the first!</div>`;

      bar.classList.add("open");

    function closeActivity() { document.getElementById("activity-bar")?.classList.remove("open"); }

    // ─────────────────────────────────────────────
    //  TRAIT FILTER — lazy loads full collection with rate-limit safety
    // ─────────────────────────────────────────────
    async function loadTraits() {
      if (traitsLoaded || traitsLoading) return;
      traitsLoading = true;
      const body = document.getElementById("filter-traits-body");
      if (body) body.innerHTML = `<div style="color:var(--g2);font-size:10px;text-align:center;padding:20px"><span class="spinner"></span> Loading traits...</div>`;

      try {
        let all = [];
        allTraits = {};
        for (const key of COLLECTION_KEYS) {
          if (!allTraits[key]) allTraits[key] = {};
          let pg = 1;
          let collectionItems = [];
          while (true) {
            const res = await fetch(RPC, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                jsonrpc: "2.0", id: `traits-${key}-${pg}`, method: "getAssetsByGroup",
                params: { groupKey: "collection", groupValue: COLLECTIONS[key].mint, page: pg, limit: 1000 }
              })
            });
            const data = await res.json();
            const items = data.result?.items || [];
            items.forEach(item => {
              collectionByMint[item.id] = key;
              const attrs = item.content?.metadata?.attributes || [];
              traitIndex[item.id] = {};
              attrs.forEach(a => {
                if (!a.trait_type || a.value == null || a.value === "") return;
                const traitType = String(a.trait_type);
                const traitValue = String(a.value);
                if (!allTraits[key][traitType]) allTraits[key][traitType] = new Set();
                allTraits[key][traitType].add(traitValue);
                traitIndex[item.id][traitType] = traitValue;
              });
            });
            collectionItems = collectionItems.concat(items);
            all = all.concat(items);
            if (body) body.innerHTML = `<div style="color:var(--g2);font-size:10px;text-align:center;padding:10px"><span class="spinner"></span> Loading... ${all.length} assets scanned</div>`;
            if (items.length < 1000 || collectionItems.length >= (data.result?.total || 0)) {
              supplyByCollection[key] = data.result?.total || collectionItems.length;
              break;
            }
            pg++;
            await new Promise(r => setTimeout(r, 400));
          }
        }
        traitsLoaded = true;
        renderFilterPanel();
      } catch (e) {
        console.error("loadTraits:", e);
        if (body) body.innerHTML = `<div style="color:var(--r);font-size:10px;text-align:center;padding:20px">Failed to load traits</div>`;
      }
      traitsLoading = false;
    }

    function renderFilterPanel() {
      const body = document.getElementById("filter-traits-body");
      if (!body) return;
      const activeCount = Object.values(activeFilters).reduce((n, v) => n + v.length, 0);
      document.getElementById("clear-filters-btn").style.opacity = activeCount ? "1" : "0.3";

      const sectionHtml = COLLECTION_KEYS.map(key => {
        const traitsForCollection = allTraits[key] || {};
        const traitKeys = Object.keys(traitsForCollection).sort();
        const color = key === "LNL" ? "var(--r)" : "var(--grn)";
        const glow = key === "LNL" ? "rgba(255,0,60,.08)" : "rgba(0,255,136,.08)";
        const border = key === "LNL" ? "rgba(255,0,60,.22)" : "rgba(0,255,136,.22)";

        return `<div style="margin-bottom:18px">
          <div style="position:sticky;top:58px;z-index:1;background:#060606;padding:10px 0 8px">
            <div style="font-family:var(--d);font-size:14px;letter-spacing:3px;color:${color};padding:8px 10px;border:1px solid ${border};border-radius:10px;background:${glow}">
              ${COLLECTIONS[key].shortLabel} TRAITS
            </div>
          </div>
          ${traitKeys.length ? traitKeys.map(trait => {
            const vals = [...traitsForCollection[trait]].sort();
            const filterKey = `${key}::${trait}`;
            const selected = activeFilters[filterKey] || [];
            return `<details class="filter-trait-group" ${selected.length ? "open" : ""}>
              <summary>
                <span style="color:${color}">${trait}</span>
                <span style="font-size:9px;color:var(--g2)">${selected.length ? `<span style="color:${color}">${selected.length} selected</span>` : vals.length + " values"}</span>
              </summary>
              <div style="padding:4px 0 8px 4px">
                ${vals.map(v => {
                  const checked = selected.includes(v);
                  return `<label class="filter-val ${checked ? "active" : ""}">
                    <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleFilter('${key}','${trait.replace(/'/g, "\\'")}','${v.replace(/'/g, "\\'")}',this.checked)">
                    ${v}
                  </label>`;
                }).join("")}
              </div>
            </details>`;
          }).join("") : `<div style="color:var(--g2);font-size:10px;padding:12px 4px">No traits found</div>`}
        </div>`;
      }).join("");

      body.innerHTML = sectionHtml || `<div style="color:var(--g2);font-size:10px;text-align:center;padding:20px">No traits found</div>`;
    }

    function toggleFilter(collectionKey, trait, value, on) {
      const namespacedKey = `${collectionKey}::${trait}`;
      if (!activeFilters[namespacedKey]) activeFilters[namespacedKey] = [];
      if (on) { if (!activeFilters[namespacedKey].includes(value)) activeFilters[namespacedKey].push(value); }
      else { activeFilters[namespacedKey] = activeFilters[namespacedKey].filter(v => v !== value); }
      if (!activeFilters[namespacedKey].length) delete activeFilters[namespacedKey];
      renderFilterPanel();
      render();
    }

      document.getElementById("filter-overlay")?.classList.add("open");

    // ─────────────────────────────────────────────
    //  SOLANA WEB3 (lazy loaded)
    // ─────────────────────────────────────────────
    // web3.js lazy loader — uses v1.73.3 which bundles its own Buffer polyfill
    let _web3 = null;
    async function getWeb3() {
      if (_web3) return _web3;
      if (window.solanaWeb3) { _web3 = window.solanaWeb3; return _web3; }
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        // v1.73.3 bundles Buffer internally — no external polyfill needed
        s.src = "https://unpkg.com/@solana/web3.js@1.73.3/lib/index.iife.min.js";
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
      _web3 = window.solanaWeb3;
      if (!_web3) throw new Error("@solana/web3.js failed to load");
      return _web3;
    }

    // ─────────────────────────────────────────────
    //  BUBBLEGUM cNFT HELPERS
    // ─────────────────────────────────────────────

    // Anchor discriminator: first 8 bytes of sha256("global:<name>")
    async function anchorDisc(name) {
      const data = new TextEncoder().encode("global:" + name);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return new Uint8Array(hash).slice(0, 8);
    }

    async function computeDiscriminators() {
      BG_IX.delegate = await anchorDisc("delegate");
      BG_IX.transfer = await anchorDisc("transfer");
    }

    function toLEU64(n) {
      const buf = new ArrayBuffer(8); new DataView(buf).setBigUint64(0, BigInt(Math.round(n)), true); return new Uint8Array(buf);
    }
    function toLEU32(n) {
      const buf = new ArrayBuffer(4); new DataView(buf).setUint32(0, n, true); return new Uint8Array(buf);
    }
    function concatBytes(...arrays) {
      const total = arrays.reduce((s, a) => s + a.length, 0);
      const out = new Uint8Array(total); let off = 0;
      for (const a of arrays) { out.set(a, off); off += a.length; }
      return out;
    }

    // Fetch cNFT compression data + merkle proof from Helius
    async function getAssetDetails(mintId) {
      const [assetRes, proofRes] = await Promise.all([
        fetch(RPC, { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: "a", method: "getAsset", params: { id: mintId } }) }),
        fetch(RPC, { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jsonrpc: "2.0", id: "p", method: "getAssetProof", params: { id: mintId } }) })
      ]);
      const asset = (await assetRes.json()).result;
      const proof = (await proofRes.json()).result;
      if (!asset || !proof) throw new Error("Could not fetch cNFT data from Helius");
      const details = {
        treeId: asset.compression?.tree,
        leafId: Number(asset.compression?.leaf_id),
        dataHash: asset.compression?.data_hash,
        creatorHash: asset.compression?.creator_hash,
        root: proof.root,
        proofPath: proof.proof || [],
        owner: asset.ownership?.owner,
        delegate: asset.ownership?.delegate || asset.ownership?.owner,
      };
      console.log("[cNFT] details:", JSON.stringify(details, null, 2));
      return details;
    }

    let BUY_IN_FLIGHT = false;

    async function waitForOwner(mintId, expectedOwner, tries = 12, delayMs = 1500) {
      for (let i = 0; i < tries; i++) {
        const asset = await getAssetDetails(mintId);
        if ((asset.owner || "").toLowerCase() === String(expectedOwner).toLowerCase()) return asset;
        await new Promise(r => setTimeout(r, delayMs));
      }
      throw new Error("Settlement returned, but ownership did not update on-chain");
    }

    // Safe PublicKey construction with clear error messages
    function safePK(PublicKey, value, label) {
      if (!value) throw new Error("Null/undefined value for " + label + ": " + value);
      try { return new PublicKey(value); }
      catch (e) { throw new Error("Invalid PublicKey for " + label + " (" + value + "): " + e.message); }
    }

    // Convert base58 hash to 32-byte buffer (for instruction data like root/dataHash/creatorHash)
    function hashToBytes(PublicKey, base58Str, label) {
      return safePK(PublicKey, base58Str, label).toBytes();
    }

    // Derive Bubblegum tree authority PDA
    function getTreeAuthority(PublicKey, treePK) {
      const bgProg = new PublicKey(BUBBLEGUM_PROGRAM);
      return PublicKey.findProgramAddressSync([treePK.toBytes()], bgProg);
    }

    // Build Bubblegum delegate instruction
    function buildDelegateIx(PublicKey, { ownerPK, previousDelegatePK, newDelegatePK, treePK, treeAuthorityPK, root, dataHash, creatorHash, nonce, index, proofPath }) {
      const bgProg = safePK(PublicKey, BUBBLEGUM_PROGRAM, "BUBBLEGUM_PROGRAM");
      const compProg = safePK(PublicKey, COMPRESSION_PROGRAM, "COMPRESSION_PROGRAM");
      const noopProg = safePK(PublicKey, NOOP_PROGRAM, "NOOP_PROGRAM");
      const sysProg = safePK(PublicKey, SYS_PROGRAM, "SYS_PROGRAM");

      const ixData = concatBytes(
        BG_IX.delegate,
        hashToBytes(PublicKey, root, "root"),
        hashToBytes(PublicKey, dataHash, "dataHash"),
        hashToBytes(PublicKey, creatorHash, "creatorHash"),
        toLEU64(nonce),
        toLEU32(index)
      );

      const keys = [
        { pubkey: treeAuthorityPK, isSigner: false, isWritable: true },
        { pubkey: ownerPK, isSigner: true, isWritable: false },
        { pubkey: previousDelegatePK, isSigner: false, isWritable: false },
        { pubkey: newDelegatePK, isSigner: false, isWritable: false },
        { pubkey: treePK, isSigner: false, isWritable: true },
        { pubkey: noopProg, isSigner: false, isWritable: false },
        { pubkey: compProg, isSigner: false, isWritable: false },
        { pubkey: sysProg, isSigner: false, isWritable: false },
      ];
      // Append proof path as remaining accounts
      proofPath.forEach((hash, i) => {
        keys.push({ pubkey: safePK(PublicKey, hash, "proof[" + i + "]"), isSigner: false, isWritable: false });
      });

      return { programId: bgProg, keys, data: ixData };
    }

    // Build Bubblegum transfer instruction (delegate transfers)
    function buildTransferIx(PublicKey, { ownerPK, delegatePK, newOwnerPK, treePK, treeAuthorityPK, root, dataHash, creatorHash, nonce, index, proofPath, delegateIsSigner }) {
      const bgProg = safePK(PublicKey, BUBBLEGUM_PROGRAM, "BUBBLEGUM_PROGRAM");
      const compProg = safePK(PublicKey, COMPRESSION_PROGRAM, "COMPRESSION_PROGRAM");
      const noopProg = safePK(PublicKey, NOOP_PROGRAM, "NOOP_PROGRAM");
      const sysProg = safePK(PublicKey, SYS_PROGRAM, "SYS_PROGRAM");

      const ixData = concatBytes(
        BG_IX.transfer,
        hashToBytes(PublicKey, root, "root"),
        hashToBytes(PublicKey, dataHash, "dataHash"),
        hashToBytes(PublicKey, creatorHash, "creatorHash"),
        toLEU64(nonce),
        toLEU32(index)
      );

      const keys = [
        { pubkey: treeAuthorityPK, isSigner: false, isWritable: true },
        { pubkey: ownerPK, isSigner: !delegateIsSigner, isWritable: false },
        { pubkey: delegatePK, isSigner: delegateIsSigner, isWritable: false },
        { pubkey: newOwnerPK, isSigner: false, isWritable: false },
        { pubkey: treePK, isSigner: false, isWritable: true },
        { pubkey: noopProg, isSigner: false, isWritable: false },
        { pubkey: compProg, isSigner: false, isWritable: false },
        { pubkey: sysProg, isSigner: false, isWritable: false },
      ];
      proofPath.forEach((hash, i) => {
        keys.push({ pubkey: safePK(PublicKey, hash, "txProof[" + i + "]"), isSigner: false, isWritable: false });
      });

      return { programId: bgProg, keys, data: ixData };
    }

    // Call the Edge Function co-signer
    async function cosign(body) {
      console.log("[cosign] sending action:", body.action, "mint:", body.mint);
      const res = await fetch(COSIGN_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${SB_KEY}` },
        body: JSON.stringify(body)
      });
      console.log("[cosign] HTTP status:", res.status, res.statusText);
      const raw = await res.text();
      console.log("[cosign] raw response:", raw);
      let data;
      try { data = JSON.parse(raw); }
      catch (e) { throw new Error("Co-signer returned non-JSON (status " + res.status + "): " + raw.slice(0, 200)); }
      if (!res.ok || data.error) throw new Error("Co-signer error (status " + res.status + "): " + (data.error || data.message || raw.slice(0, 200)));
      return data;
    }

    // ─────────────────────────────────────────────
    //  RECORD SALE
    // ─────────────────────────────────────────────
    async function recordSale({ mint, seller, buyer, price_sol, name, image, tx_sig }) {
      try {
        await fetch(`${SB_URL}/rest/v1/marketplace_sales`, {
          method: "POST",
          headers: { ...SB_HDR, Prefer: "return=minimal" },
          body: JSON.stringify({ mint, seller, buyer, price_sol, name, image, tx_sig })
        });
        totalVolume += parseFloat(price_sol);
      } catch (e) { console.error("recordSale:", e); }

    // ─────────────────────────────────────────────
    //  LIST (Bubblegum Delegate to escrow)
    //  Seller signs → cNFT delegated to escrow address
    //  cNFT stays in wallet but escrow can transfer it
    // ─────────────────────────────────────────────
    async function listNft(nft, priceSol) {
      // The listing modal is already removed before this is called for new listings.
      // We use a toast-based progress flow instead of relying on a modal button.
      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction } = web3;
        const conn = new Connection(RPC, "confirmed");

        showToast("Fetching proof...");
        console.log("[listNft] fetching cNFT data for:", nft.mint);
        const details = await getAssetDetails(nft.mint);

        const ownerPK = safePK(PublicKey, walletAddress, "walletAddress");
        const escrowPK = safePK(PublicKey, ESCROW_ADDRESS, "ESCROW_ADDRESS");
        const treePK = safePK(PublicKey, details.treeId, "treeId");
        const [treeAuthorityPK] = getTreeAuthority(PublicKey, treePK);
        const prevDelegatePK = safePK(PublicKey, details.delegate, "delegate");

        const delegateIx = buildDelegateIx(PublicKey, {
          ownerPK, previousDelegatePK: prevDelegatePK, newDelegatePK: escrowPK,
          treePK, treeAuthorityPK,
          root: details.root, dataHash: details.dataHash, creatorHash: details.creatorHash,
          nonce: details.leafId, index: details.leafId,
          proofPath: details.proofPath
        });

        const tx = new Transaction().add(delegateIx);
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = ownerPK;

        showToast("Sign in wallet to list...");
        const signed = await walletProvider.signTransaction(tx);
        showToast("Confirming on-chain...");
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        // Save to Supabase
        await sbUpsert("marketplace_listings", {
          mint: nft.mint, seller: walletAddress,
          price_sol: parseFloat(priceSol),
          name: nft.name, image: nft.image
        });
        listings[nft.mint] = { mint: nft.mint, seller: walletAddress, price_sol: parseFloat(priceSol), name: nft.name, image: nft.image };
        showToast("Listed for " + priceSol + " SOL ✓");
        awardListPoints(nft.mint); // +5 cabbage
        render();

      } catch (e) {
        console.error("[listNft]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Listing cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
      }
    }

    // ─────────────────────────────────────────────
    //  DELIST (Delegate back to self)
    // ─────────────────────────────────────────────
    async function delistNft(mint) {
      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction } = web3;
        const conn = new Connection(RPC, "confirmed");

        showToast("Fetching proof...");
        const details = await getAssetDetails(mint);
        const ownerPK = new PublicKey(walletAddress);
        const treePK = new PublicKey(details.treeId);
        const [treeAuthorityPK] = getTreeAuthority(PublicKey, treePK);

        // Delegate back to owner (revoke escrow)
        const delegateIx = buildDelegateIx(PublicKey, {
          ownerPK, previousDelegatePK: new PublicKey(ESCROW_ADDRESS), newDelegatePK: ownerPK,
          treePK, treeAuthorityPK,
          root: details.root, dataHash: details.dataHash, creatorHash: details.creatorHash,
          nonce: details.leafId, index: details.leafId,
          proofPath: details.proofPath
        });

        const tx = new Transaction().add(delegateIx);
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = ownerPK;

        showToast("Sign in wallet to delist...");
        const signed = await walletProvider.signTransaction(tx);
        showToast("Confirming...");
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        await sbDelete("marketplace_listings", { mint });
        delete listings[mint];
        showToast("Listing removed ✓");
        render();
      } catch (e) {
        console.error("[delistNft]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        // Re-open listing modal so user can retry
        const nft = myNfts.find(n => n.mint === mint) || { mint, name: listings[mint]?.name || mint, image: listings[mint]?.image || "" };
        showListingModal(nft);
      }
    }

    // ─────────────────────────────────────────────
    //  BUY NOW — 2-step atomic purchase
    //  TX1 (buyer signs): SOL → seller + treasury fee
    //  TX2 (edge fn): escrow delegate transfers cNFT → buyer
    //  Splitting avoids the 1232-byte tx limit caused by 20 proof accounts
    // ─────────────────────────────────────────────
    async function buyNft(listing) {
      console.log("[buyNft] 2-step flow — wallet:", walletAddress, "mint:", listing?.mint);
      if (!walletAddress || !walletProvider) { showToast("Connect wallet first", true); return; }

      const btn = document.getElementById("buy-btn");
      const setBtn = (html, dis) => { if (btn) { btn.innerHTML = html; btn.disabled = dis; } };
      setBtn(`<span class="spinner"></span>LOADING...`, true);

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const buyerPK = new PublicKey(walletAddress);
        const sellerPK = new PublicKey(listing.seller);
        const treasuryPK = new PublicKey(TREASURY);
        const escrowPK = new PublicKey(ESCROW_ADDRESS);

        const priceLamports = Math.round(listing.price_sol * LAMPORTS_PER_SOL);
        const feeLamports = Math.round(priceLamports * FEE_PCT);
        const sellerLamports = priceLamports - feeLamports;

        // ── TX1: Buyer pays SOL ──────────────────────────────────
        // Build SOL transfer instructions manually — avoids Buffer dependency in SystemProgram.transfer
        setBtn(`<span class="spinner"></span>SIGN PAYMENT...`, true);
        const sysPK = new PublicKey("11111111111111111111111111111111");
        const buildSolIx = (fromPK, toPK, lamports) => ({
          programId: sysPK,
          keys: [
            { pubkey: fromPK, isSigner: true, isWritable: true },
            { pubkey: toPK, isSigner: false, isWritable: true }
          ],
          data: new Uint8Array([...toLEU32(2), ...toLEU64(lamports)])
        });
        const payTx = new Transaction();
        payTx.add(buildSolIx(buyerPK, sellerPK, sellerLamports));
        if (feeLamports > 0) {
          payTx.add(buildSolIx(buyerPK, treasuryPK, feeLamports));
        }
        const { blockhash: bh1, lastValidBlockHeight: lbh1 } = await conn.getLatestBlockhash();
        payTx.recentBlockhash = bh1;
        payTx.lastValidBlockHeight = lbh1;
        payTx.feePayer = buyerPK;

        const signedPayTx = await walletProvider.signTransaction(payTx);
        setBtn(`<span class="spinner"></span>SENDING PAYMENT...`, true);
        const paySig = await conn.sendRawTransaction(signedPayTx.serialize(), { skipPreflight: false });
        showToast("Payment sent — transferring NFT...");
        const payResult = await conn.confirmTransaction({ signature: paySig, blockhash: bh1, lastValidBlockHeight: lbh1 }, "confirmed");
        if (payResult.value.err) throw new Error("Payment tx failed: " + JSON.stringify(payResult.value.err));
        console.log("[buyNft] TX1 SOL payment confirmed:", paySig);

        // ── TX2: Edge fn transfers cNFT ──────────────────────────
        // Escrow delegate transfers cNFT to buyer — edge fn builds + signs entirely
        setBtn(`<span class="spinner"></span>TRANSFERRING NFT...`, true);
        const result = await cosign({
          action: "settle-buy",
          mint: listing.mint,
          buyer: walletAddress,
          seller: listing.seller,
          depositSig: paySig
        });
        console.log("[buyNft] settle-buy result:", result);

        // Clean up Supabase (edge fn also does this, belt-and-suspenders)
        await sbDelete("marketplace_listings", { mint: listing.mint });
        delete listings[listing.mint];
        await sbDelete("marketplace_offers", { mint: listing.mint });
        delete offers[listing.mint];
        await recordSale({
          mint: listing.mint, seller: listing.seller, buyer: walletAddress,
          price_sol: listing.price_sol, name: listing.name, image: listing.image,
          tx_sig: result.sig || paySig
        });

        selectedNft = null;
        await fetchMyNfts();
        showToast("You own it! 🐦 " + listing.name);
        loadCabbageData(); // refresh points

      } catch (e) {
        console.error("[buyNft] CAUGHT ERROR:", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        setBtn(`BUY NOW — ◎ ${listing.price_sol} SOL`, false);
      }
    }

    // ─────────────────────────────────────────────
    //  MAKE OFFER (Send SOL to escrow wallet — locked on-chain)
    // ─────────────────────────────────────────────
    async function makeOffer(nft, offerSol) {
      if (!walletAddress || !walletProvider) { showToast("Connect wallet first", true); return; }

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction, LAMPORTS_PER_SOL } = web3;
        const conn = new Connection(RPC, "confirmed");

        const buyerPK = new PublicKey(walletAddress);
        const escrowPK = new PublicKey(ESCROW_ADDRESS);
        const lamports = Math.round(parseFloat(offerSol) * LAMPORTS_PER_SOL);

        // Build SOL transfer manually — avoids Buffer dependency
        const sysPK = new PublicKey("11111111111111111111111111111111");
        const tx = new Transaction().add({
          programId: sysPK,
          keys: [
            { pubkey: buyerPK, isSigner: true, isWritable: true },
            { pubkey: escrowPK, isSigner: false, isWritable: true }
          ],
          data: new Uint8Array([...toLEU32(2), ...toLEU64(lamports)])
        });
        const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
        tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
        tx.feePayer = buyerPK;

        const signed = await walletProvider.signTransaction(tx);
        const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
        await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");

        // Save to Supabase
        const obj = { mint: nft.mint, buyer: walletAddress, price_sol: parseFloat(offerSol), name: nft.name, image: nft.image };
        await sbUpsert("marketplace_offers", obj);
        if (!offers[nft.mint]) offers[nft.mint] = [];
        const idx = offers[nft.mint].findIndex(o => o.buyer === walletAddress);
        if (idx >= 0) offers[nft.mint][idx] = obj; else offers[nft.mint].push(obj);
        showToast("Offer placed — " + offerSol + " SOL locked in escrow ✓");
        render();

      } catch (e) {
        console.error("[makeOffer]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Offer failed: " + (e.message || "unknown"), true);
        }
      }
    }

    // ─────────────────────────────────────────────
    //  CANCEL OFFER (Edge Function returns SOL from escrow)
    // ─────────────────────────────────────────────
    async function cancelOffer(mint) {
      if (!walletAddress) return;
      try {
        showToast("Returning SOL from escrow...");
        await cosign({ action: "cancel-offer", mint, buyer: walletAddress });
        // Remove from Supabase
        await sbDelete("marketplace_offers", { mint, buyer: walletAddress });
        // Update local state
        if (offers[mint]) offers[mint] = offers[mint].filter(o => o.buyer !== walletAddress);
        showToast("Offer cancelled — SOL returned ✓");
        render();
      } catch (e) {
        console.error("[cancelOffer]", e);
        showToast("Failed: " + (e.message || "unknown"), true);
      }
    }

    // ─────────────────────────────────────────────
    //  ACCEPT OFFER
    //  Seller signs an auth message proving identity.
    //  Edge fn does the full settlement server-side:
    //  cNFT transfer (escrow delegate) + SOL release to seller + fee.
    //  No tx size issue since the edge fn builds it with full Buffer support.
    // ─────────────────────────────────────────────
    async function acceptOffer(offerData) {
      if (!walletAddress || !walletProvider) return;

      const btn = document.getElementById(`accept-${offerData.buyer.slice(0, 6)}`);
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`; }

      try {
        // Build auth message: "accept-offer:<mint>:<buyer>:<seller>"
        // Seller signs this to prove they authorise the settlement
        const authMsg = `accept-offer:${offerData.mint}:${offerData.buyer}:${walletAddress}`;
        const authBytes = new TextEncoder().encode(authMsg);

        if (!walletProvider.signMessage) throw new Error("Wallet does not support signMessage");
        const authSigRaw = await walletProvider.signMessage(authBytes, "utf8");

        // Different wallets return different shapes — normalize to Uint8Array
        let sigBytes;
        if (authSigRaw instanceof Uint8Array) {
          sigBytes = authSigRaw;
        } else if (authSigRaw?.signature instanceof Uint8Array) {
          sigBytes = authSigRaw.signature; // Phantom returns { signature: Uint8Array }
        } else if (authSigRaw?.data instanceof Uint8Array) {
          sigBytes = authSigRaw.data;
        } else {
          sigBytes = new Uint8Array(Object.values(authSigRaw));
        }
        const sigB64 = btoa(sigBytes.reduce((s, b) => s + String.fromCharCode(b), ""));
        console.log("[acceptOffer] authSig bytes:", sigBytes.length, "b64 length:", sigB64.length);

        showToast("Settling offer...");
        const result = await cosign({
          action: "settle-accept",
          mint: offerData.mint,
          buyer: offerData.buyer,
          seller: walletAddress,
          authMessage: authMsg,
          authSignature: sigB64
        });
        console.log("[acceptOffer] settle-accept result:", result);

        // Clean up local state
        await sbDelete("marketplace_listings", { mint: offerData.mint });
        await sbDelete("marketplace_offers", { mint: offerData.mint });
        delete listings[offerData.mint];
        delete offers[offerData.mint];
        await recordSale({
          mint: offerData.mint, seller: walletAddress, buyer: offerData.buyer,
          price_sol: offerData.price_sol, name: offerData.name, image: offerData.image,
          tx_sig: result.sig
        });

        selectedNft = null;
        await fetchMyNfts();
        showToast("Sold! SOL received. 🐦");
        loadCabbageData(); // refresh points

      } catch (e) {
        console.error("[acceptOffer]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {

    function parseAsset(item) {
      const meta = item.content?.metadata || {};
      const files = item.content?.files || [];
      const links = item.content?.links || {};
      const img = links.image || files[0]?.cdn_uri || files[0]?.uri || "";
      const compressed = !!item.compression?.compressed;
      const collectionKey = detectCollectionKey(item);
      return { mint: item.id, name: meta.name || "Long Neck Legend", image: img, attributes: meta.attributes || [], owner: item.ownership?.owner || "", compressed, collectionKey };
    }

    // fetchPage kept as stub so existing retry/init calls don't break.
    async function fetchPage(pg) {

      // and refreshed whenever a listing is added/removed.
      render();
    }

    async function fetchMyNfts() {
      if (!walletAddress) return;
      myNfts = []; render();
      try {
        let pg = 1, all = [];
        while (true) {
          const res = await fetch(RPC, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              jsonrpc: "2.0", id: "my", method: "getAssetsByOwner",
              params: {
                ownerAddress: walletAddress, page: pg, limit: 1000,
                displayOptions: { showUnverifiedCollections: true }
              }
            })
          });
          const data = await res.json();
          if (data.error) break;
          const items = data.result?.items || [];
          all = all.concat(items);
          if (items.length < 1000) break;
          pg++;
        }
        myNfts = all.filter(item => {
          const collectionKey = detectCollectionKey(item);
          if (!collectionKey) return false;
          item.__collectionKey = collectionKey;
          collectionByMint[item.id] = collectionKey;
          return true;
        }).map(parseAsset);
      } catch (e) { console.error(e); }
      render();
    }

          let liveHtml = `<div style="display:flex;align-items:center;gap:6px;padding:8px 0;margin-bottom:8px"><span class="dot-sm"></span><span style="font-size:9px;color:var(--g2);letter-spacing:2px">${allActive.length} ACTIVE TRADE${allActive.length !== 1 ? "S" : ""} ON THE MARKET</span></div>`;
          liveHtml += liveFeed.map(t => renderTradeCard(t, "live")).join("");
          listEl.innerHTML = liveHtml;
        }
      } else if (tradeSubTab === "incoming") {
        if (!incoming.length) {
          listEl.innerHTML = `<div class="trade-empty" style="padding:30px"><div style="font-size:36px;opacity:.08;margin-bottom:10px">📥</div><div style="font-size:10px;color:var(--g2);letter-spacing:2px">NO INCOMING TRADE PROPOSALS</div></div>`;
        } else {
          listEl.innerHTML = incoming.map(t => renderTradeCard(t, "incoming")).join("");
        }
      } else if (tradeSubTab === "outgoing") {
        if (!outgoing.length) {
          listEl.innerHTML = `<div class="trade-empty" style="padding:30px"><div style="font-size:36px;opacity:.08;margin-bottom:10px">📤</div><div style="font-size:10px;color:var(--g2);letter-spacing:2px">NO OUTGOING TRADE PROPOSALS</div></div>`;
        } else {
          listEl.innerHTML = outgoing.map(t => renderTradeCard(t, "outgoing")).join("");
        }
      } else {
        if (!history.length) {
          listEl.innerHTML = `<div class="trade-empty" style="padding:30px"><div style="font-size:36px;opacity:.08;margin-bottom:10px">📜</div><div style="font-size:10px;color:var(--g2);letter-spacing:2px">NO TRADE HISTORY YET</div></div>`;
        } else {
          listEl.innerHTML = history.slice(0, 20).map(t => renderTradeCard(t, "history")).join("");
        }
      }

      setTimeout(() => {
        document.getElementById("create-trade-btn")?.addEventListener("click", () => {
          if (!walletAddress) { showWalletPicker(); return; }
          showCreateTradeModal();
        });
        document.querySelectorAll("[data-st]").forEach(b => {
          b.onclick = () => {
            if (b.dataset.st !== "live" && !walletAddress) { showWalletPicker(); return; }
            tradeSubTab = b.dataset.st; render();
          };
        });
        document.querySelectorAll("[data-trade-accept]").forEach(b => {
          b.onclick = () => acceptTrade(b.dataset.tradeAccept);
        });
        document.querySelectorAll("[data-trade-cancel]").forEach(b => {
          b.onclick = () => cancelTrade(b.dataset.tradeCancel);
        });
        document.querySelectorAll("[data-trade-decline]").forEach(b => {
          b.onclick = () => declineTrade(b.dataset.tradeDecline);
        });
      }, 0);
    }

    function renderTradeCard(trade, context) {
      const isIncoming = context === "incoming" || (context === "live" && trade.to_wallet === walletAddress && trade.status === "pending");
      const isOutgoing = context === "outgoing" || (context === "live" && trade.from_wallet === walletAddress && trade.status === "pending");
      const isLive = context === "live";
      const cardClass = isIncoming ? "trade-card incoming" : "trade-card";

      // Parse NFT arrays
      const offerNfts = trade.offer_nfts || [];
      const wantNfts = trade.want_nfts || [];
      const sweetener = parseFloat(trade.sweetener_sol || 0);

      const fromLabel = trade.from_wallet === walletAddress ? "YOU" : short(trade.from_wallet, 4, 4);
      const toLabel = trade.to_wallet === walletAddress ? "YOU" : (trade.to_wallet ? short(trade.to_wallet, 4, 4) : "ANYONE");

      let statusBadge = "";
      if (trade.status === "pending" && isLive && !isIncoming && !isOutgoing) {
        statusBadge = `<span class="trade-status pending" style="background:rgba(0,255,136,.06);border-color:rgba(0,255,136,.2);color:var(--grn)"><span class="dot-sm" style="width:4px;height:4px"></span> ACTIVE</span>`;
      } else if (trade.status === "pending") {
        statusBadge = `<span class="trade-status pending">⏳ PENDING</span>`;
      } else if (trade.status === "completed" && isLive) {
        statusBadge = `<span class="trade-status completed">🤝 SWAPPED</span>`;
      } else if (trade.status === "completed") {
        statusBadge = `<span class="trade-status completed">✓ COMPLETED</span>`;
      } else if (trade.status === "cancelled") {
        statusBadge = `<span class="trade-status cancelled">✕ CANCELLED</span>`;
      } else if (trade.status === "declined") {
        statusBadge = `<span class="trade-status cancelled">✕ DECLINED</span>`;
      }

      const offerThumbsHtml = offerNfts.map(n =>
        `<div style="display:flex;gap:8px;align-items:center">
          ${n.image ? `<img src="${n.image}" class="trade-nft-thumb" onerror="this.style.background='#1a1a1a'">` : `<div class="trade-nft-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">🐦</div>`}
          <div class="trade-nft-info"><div style="font-family:var(--d);font-size:12px;color:#fff;letter-spacing:1px">${n.name || "NFT"}</div><div style="font-size:8px;color:var(--g2);margin-top:2px">${short(n.mint, 6, 4)}</div></div>
        </div>`
      ).join("");

      const wantThumbsHtml = wantNfts.map(n =>
        `<div style="display:flex;gap:8px;align-items:center">
          ${n.image ? `<img src="${n.image}" class="trade-nft-thumb" onerror="this.style.background='#1a1a1a'">` : `<div class="trade-nft-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">🐦</div>`}
          <div class="trade-nft-info"><div style="font-family:var(--d);font-size:12px;color:#fff;letter-spacing:1px">${n.name || "NFT"}</div><div style="font-size:8px;color:var(--g2);margin-top:2px">${short(n.mint, 6, 4)}</div></div>
        </div>`
      ).join("");

      let actions = "";
      if (trade.status === "pending") {
        if (isIncoming) {
          // Only allow accept if the trade has cards requested from you
          const hasWantNfts = (trade.want_nfts || []).length > 0;
          if (hasWantNfts) {
            actions = `<div class="trade-actions">
        <button class="btn-green" style="flex:2;padding:8px 16px;font-size:12px" data-trade-accept="${trade.id}">ACCEPT TRADE</button>
        <button class="btn-danger" style="padding:8px 14px;font-size:11px" data-trade-decline="${trade.id}">DECLINE</button>
      </div>`;
          } else {
            actions = `<div class="trade-actions">
        <div style="flex:2;padding:8px 12px;background:#060606;border:1px solid rgba(255,0,60,.15);border-radius:8px;font-size:9px;color:var(--r);text-align:center">INVALID — No cards requested from you</div>
        <button class="btn-danger" style="padding:8px 14px;font-size:11px" data-trade-decline="${trade.id}">DECLINE</button>
      </div>`;
          }
        } else if (isOutgoing) {
          actions = `<div class="trade-actions">
        <button class="btn-danger" style="padding:8px 14px;font-size:11px" data-trade-cancel="${trade.id}">CANCEL TRADE</button>
      </div>`;
        }
      }

      const timeStr = trade.created_at ? timeAgo(trade.created_at) : "";

      return `<div class="${cardClass}" style="animation:up .3s ease both">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px">
      <div style="display:flex;align-items:center;gap:8px">
        ${statusBadge}
        <span style="font-size:9px;color:var(--g2)">${timeStr}</span>
      </div>
      <div style="font-size:9px;color:var(--g2);letter-spacing:1px">${fromLabel} → ${toLabel}</div>
    </div>
    <div style="padding:12px;background:#060606;border:1px solid #111;border-radius:10px;margin-bottom:4px">
      <div style="font-size:8px;color:var(--r);letter-spacing:2px;margin-bottom:8px;font-family:var(--d)">OFFERING</div>
      <div style="display:flex;flex-direction:column;gap:8px">${offerThumbsHtml || `<span style="font-size:10px;color:var(--g2)">No NFTs</span>`}</div>
      ${sweetener > 0 ? `<div style="margin-top:8px;font-size:10px;color:var(--grn);font-family:var(--d);letter-spacing:1px">+ ◎ ${sweetener} SOL SWEETENER</div>` : ""}
    </div>
    <div class="trade-arrow">⇅</div>
    <div style="padding:12px;background:#060606;border:1px solid #111;border-radius:10px">
      <div style="font-size:8px;color:var(--grn);letter-spacing:2px;margin-bottom:8px;font-family:var(--d)">WANTS</div>
      <div style="display:flex;flex-direction:column;gap:8px">${wantThumbsHtml || `<span style="font-size:10px;color:var(--g2)">No NFTs specified</span>`}</div>
    </div>
    ${trade.note ? `<div style="margin-top:10px;padding:8px 12px;background:var(--rb);border-radius:6px;font-size:10px;color:var(--g1);line-height:1.5;font-style:italic">"${trade.note}"</div>` : ""}
    ${actions}
  </div>`;
    }

    // ─────────────────────────────────────────────
    //  CREATE TRADE MODAL (multi-step)
    // ─────────────────────────────────────────────
    let _tradeStep = 1;
    let _tradeOffer = []; // NFTs user is offering
    let _tradeWant = [];  // NFTs user wants
    let _tradeCounterparty = ""; // target wallet
    let _tradeSweetener = 0;
    let _tradeNote = "";
    let _tradeOpenToAll = false;

    function showCreateTradeModal() {
      if (!walletAddress || !walletProvider) { showWalletPicker(); return; }
      if (!myNfts.length) { showToast("Loading your NFTs...", true); fetchMyNfts(); return; }

      _tradeOffer = [];
      _tradeWant = [];
      _tradeCounterparty = "";
      _tradeSweetener = 0;
      _tradeNote = "";

      counterpartyNfts = [];

    }

      const ex = document.getElementById("tm"); if (ex) ex.remove();
      const ov = document.createElement("div");
      ov.id = "tm"; ov.className = "modal-bg";

      const stepTitles = ["SELECT YOUR CARDS", "WHO TO TRADE WITH", "SELECT THEIR CARDS", "REVIEW & PROPOSE"];

      if (_tradeStep === 1) {
        // Step 1: Pick your NFTs to offer

        content = `<div style="margin-bottom:14px">
      <div style="font-size:9px;color:var(--g2);letter-spacing:2px;margin-bottom:8px">YOUR COLLECTION — TAP TO SELECT</div>

    </div>
    <div style="font-size:10px;color:var(--g1);margin-bottom:14px"><span style="color:var(--r);font-family:var(--d)">${_tradeOffer.length}</span> card${_tradeOffer.length !== 1 ? "s" : ""} selected</div>
    <button class="btn-primary" id="trade-next" ${!_tradeOffer.length ? "disabled" : ""}>NEXT — CHOOSE RECIPIENT</button>`;

      } else if (_tradeStep === 2) {

      <input class="input" id="cp-wallet" placeholder="e.g. 7xKX...j3nP" value="${_tradeCounterparty}" style="margin-bottom:10px">
      <div style="font-size:9px;color:var(--g2);line-height:1.7;padding:10px 12px;background:#050505;border:1px solid #111;border-radius:8px">

      <button class="btn-ghost" id="trade-back" style="flex:1">BACK</button>
      <button class="btn-primary" id="trade-next2" style="flex:2">NEXT — SELECT THEIR CARDS</button>
    </div>`;

      } else if (_tradeStep === 3) {
        // Step 3: Pick counterparty's NFTs
        let pickContent = "";
        if (counterpartyNfts.length) {
          const pickGrid = counterpartyNfts.map(n => {
            const sel = _tradeWant.some(w => w.mint === n.mint);
            return `<div class="nft-pick-card ${sel ? "selected" : ""}" data-want="${n.mint}">
          ${n.image ? `<img src="${n.image}" onerror="this.style.background='#1a1a1a'">` : `<div style="height:80px;display:flex;align-items:center;justify-content:center;font-size:24px;background:#111">🐦</div>`}
          <div class="pick-name">${n.name}</div>
        </div>`;
          }).join("");
          pickContent = `<div style="margin-bottom:14px">
        <div style="font-size:9px;color:var(--g2);letter-spacing:2px;margin-bottom:8px">THEIR COLLECTION — TAP TO SELECT</div>
        <div class="nft-pick-grid" id="want-pick-grid">${pickGrid}</div>
      </div>
      <div style="font-size:10px;color:var(--g1);margin-bottom:10px"><span style="color:var(--grn);font-family:var(--d)">${_tradeWant.length}</span> card${_tradeWant.length !== 1 ? "s" : ""} selected</div>`;

          pickContent = `<div style="text-align:center;padding:30px">
        <div class="spinner" style="margin:0 auto 12px"></div>

      </div>`;
        }

        // Sweetener option
        const sweetenerHtml = `<div class="sweetener-row">
      <div style="flex:1">
        <div style="font-size:9px;color:var(--g2);letter-spacing:2px;margin-bottom:4px">SOL SWEETENER (OPTIONAL)</div>

      <div style="font-size:9px;color:var(--g2);line-height:1.5;max-width:180px">Add SOL to sweeten the deal. Locked in escrow until accepted or cancelled.</div>

          <div><div style="font-family:var(--d);font-size:11px;color:#fff;letter-spacing:1px">${n.name}</div></div>
        </div>`
          ).join("");

        content = `<div style="padding:14px;background:#060606;border:1px solid #111;border-radius:10px;margin-bottom:6px">
