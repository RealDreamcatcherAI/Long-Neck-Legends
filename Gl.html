    </div>
    <div class="trade-arrow">⇅</div>
    <div style="padding:14px;background:#060606;border:1px solid #111;border-radius:10px;margin-bottom:10px">
      <div style="font-size:8px;color:var(--grn);letter-spacing:2px;margin-bottom:8px;font-family:var(--d)">YOU GET</div>
      ${wantPreview}
    </div>
    ${_tradeSweetener > 0 ? `<div style="padding:8px 12px;background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.1);border-radius:8px;margin-bottom:10px;font-size:10px;color:var(--grn);font-family:var(--d);letter-spacing:1px">+ ◎ ${_tradeSweetener} SOL SWEETENER</div>` : ""}
    <div style="padding:8px 12px;background:#050505;border:1px solid #111;border-radius:8px;margin-bottom:14px;font-size:9px;color:var(--g2);line-height:1.7">
      To: <span style="color:var(--g1)">${short(_tradeCounterparty, 8, 6)}</span>
      &nbsp;•&nbsp; Both parties sign to swap
      ${_tradeSweetener > 0 ? `&nbsp;•&nbsp; ${_tradeSweetener} SOL locked in escrow` : ""}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:9px;color:var(--g2);letter-spacing:2px;margin-bottom:6px">ADD A NOTE (OPTIONAL)</div>
      <input class="input" id="trade-note" placeholder="e.g. Been looking for this one!" value="${_tradeNote}">
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost" id="trade-back4" style="flex:1">BACK</button>
      <button class="btn-green" id="trade-propose" style="flex:2">🤝 PROPOSE TRADE</button>
    </div>`;
      }

      ov.innerHTML = `<div style="background:linear-gradient(145deg,#0c0c0c,#080808);border:1px solid #1c1c1c;border-radius:16px;padding:28px;width:100%;max-width:480px;position:relative;animation:up .2s;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">
    <button onclick="document.getElementById('tm').remove()" style="position:absolute;top:12px;right:12px;background:rgba(255,0,60,.08);border:1px solid rgba(255,0,60,.2);color:var(--r);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:13px;display:grid;place-items:center;z-index:2">✕</button>
    <div style="font-family:var(--d);font-size:20px;color:#fff;letter-spacing:3px;margin-bottom:4px;text-align:center">NEW TRADE</div>
    <div style="font-size:10px;color:var(--g2);text-align:center;margin-bottom:16px;letter-spacing:1px">${stepTitles[_tradeStep - 1]}</div>
    <div class="step-dots">
      ${[1, 2, 3, 4].map(s => `<div class="step-dot ${s === _tradeStep ? 'active' : s < _tradeStep ? 'done' : ''}"></div>`).join("")}
    </div>
    ${content}
  </div>`;

      document.body.appendChild(ov);
      bindTradeModalEvents();
    }

    function bindTradeModalEvents() {
      // Step 1: pick offer NFTs
      document.querySelectorAll("[data-pick]").forEach(card => {
        card.onclick = () => {
          const mint = card.dataset.pick;
          const nft = myNfts.find(n => n.mint === mint);
          if (!nft) return;
          const idx = _tradeOffer.findIndex(o => o.mint === mint);
          if (idx >= 0) _tradeOffer.splice(idx, 1);
          else _tradeOffer.push({ mint: nft.mint, name: nft.name, image: nft.image });
          renderTradeModal();
        };
      });

      // Step 1 → 2
      document.getElementById("trade-next")?.addEventListener("click", () => { _tradeStep = 2; renderTradeModal(); });

      // Step 2: wallet input
      document.getElementById("cp-wallet")?.addEventListener("input", e => { _tradeCounterparty = e.target.value.trim(); });

      // Step 2 → 3
      document.getElementById("trade-next2")?.addEventListener("click", async () => {
        if (!_tradeCounterparty) { showToast("Enter a wallet address", true); return; }
        if (_tradeCounterparty === walletAddress) { showToast("Can't trade with yourself", true); return; }
        _tradeStep = 3;
        renderTradeModal();
        await loadCounterpartyNfts(_tradeCounterparty);
        if (_tradeStep === 3) renderTradeModal();
      });

      // Step 3: pick want NFTs
      document.querySelectorAll("[data-want]").forEach(card => {
        card.onclick = () => {
          const mint = card.dataset.want;
          const nft = counterpartyNfts.find(n => n.mint === mint);
          if (!nft) return;
          const idx = _tradeWant.findIndex(w => w.mint === mint);
          if (idx >= 0) _tradeWant.splice(idx, 1);
          else _tradeWant.push({ mint: nft.mint, name: nft.name, image: nft.image });
          renderTradeModal();
        };
      });

      // Step 3: sweetener
      document.getElementById("trade-sweet")?.addEventListener("input", e => { _tradeSweetener = parseFloat(e.target.value) || 0; });

      // Step 3 → 4
      document.getElementById("trade-next3")?.addEventListener("click", () => { _tradeStep = 4; renderTradeModal(); });

      // Step 4: note
      document.getElementById("trade-note")?.addEventListener("input", e => { _tradeNote = e.target.value; });

      // Back buttons
      document.getElementById("trade-back")?.addEventListener("click", () => { _tradeStep = 1; renderTradeModal(); });
      document.getElementById("trade-back3")?.addEventListener("click", () => { _tradeStep = 2; renderTradeModal(); });
      document.getElementById("trade-back4")?.addEventListener("click", () => { _tradeStep = 3; renderTradeModal(); });

      // Propose
      document.getElementById("trade-propose")?.addEventListener("click", () => proposeTrade());
    }

    async function loadCounterpartyNfts(wallet) {
      counterpartyNfts = [];
      try {
        let pg = 1, all = [];
        while (true) {
          const res = await fetch(RPC, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              jsonrpc: "2.0", id: "cp", method: "getAssetsByOwner",
              params: { ownerAddress: wallet, page: pg, limit: 1000, displayOptions: { showUnverifiedCollections: true } }
            })
          });
          const data = await res.json();
          if (data.error) break;
          const items = data.result?.items || [];
          all = all.concat(items);
          if (items.length < 1000) break;
          pg++;
        }
        counterpartyNfts = all.filter(item => {
          const ck = detectCollectionKey(item);
          if (!ck) return false;
          collectionByMint[item.id] = ck;
          return true;
        }).map(parseAsset);
      } catch (e) { console.error("[loadCounterpartyNfts]", e); }
    }

    // ─────────────────────────────────────────────
    //  PROPOSE TRADE — Delegate offered NFTs to escrow + save to Supabase
    // ─────────────────────────────────────────────
    async function proposeTrade() {
      if (!walletAddress || !walletProvider) return;
      const proposeBtn = document.getElementById("trade-propose");
      if (proposeBtn) { proposeBtn.disabled = true; proposeBtn.innerHTML = `<span class="spinner"></span>PROPOSING...`; }

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction } = web3;
        const conn = new Connection(RPC, "confirmed");

        // Delegate each offered NFT to escrow
        showToast("Delegating your cards to escrow...");
        for (const nft of _tradeOffer) {
          const details = await getAssetDetails(nft.mint);
          // Only delegate if not already delegated to escrow
          if (details.delegate !== ESCROW_ADDRESS) {
            const ownerPK = safePK(PublicKey, walletAddress, "walletAddress");
            const escrowPK = safePK(PublicKey, ESCROW_ADDRESS, "ESCROW_ADDRESS");
            const treePK = safePK(PublicKey, details.treeId, "treeId");
            const [treeAuthorityPK] = getTreeAuthority(PublicKey, treePK);
            const prevDelegatePK = safePK(PublicKey, details.delegate, "delegate");

            const delegateIx = buildDelegateIx(PublicKey, {
              ownerPK, previousDelegatePK: prevDelegatePK, newDelegatePK: escrowPK,
              treePK, treeAuthorityPK,
              root: details.root, dataHash: details.dataHash, creatorHash: details.creatorHash,
              nonce: details.leafId, index: details.leafId,
              proofPath: details.proofPath
            });

            const tx = new Transaction().add(delegateIx);
            const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
            tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
            tx.feePayer = ownerPK;

            showToast(`Sign to delegate ${nft.name}...`);
            const signed = await walletProvider.signTransaction(tx);
            const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
            await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");
          }
        }

        // If there's a SOL sweetener, send it to escrow
        if (_tradeSweetener > 0) {
          showToast("Locking SOL sweetener in escrow...");
          const { PublicKey: PK, Transaction: Tx, LAMPORTS_PER_SOL } = web3;
          const buyerPK = new PK(walletAddress);
          const escrowPK = new PK(ESCROW_ADDRESS);
          const lamports = Math.round(_tradeSweetener * LAMPORTS_PER_SOL);
          const sysPK = new PK("11111111111111111111111111111111");
          const tx = new Tx().add({
            programId: sysPK,
            keys: [{ pubkey: buyerPK, isSigner: true, isWritable: true }, { pubkey: escrowPK, isSigner: false, isWritable: true }],
            data: new Uint8Array([...toLEU32(2), ...toLEU64(lamports)])
          });
          const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
          tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
          tx.feePayer = buyerPK;
          const signed = await walletProvider.signTransaction(tx);
          const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
          await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");
        }

        // Save to Supabase
        const tradeObj = {
          from_wallet: walletAddress,
          to_wallet: _tradeCounterparty,
          offer_nfts: _tradeOffer,
          want_nfts: _tradeWant,
          sweetener_sol: _tradeSweetener || 0,
          note: _tradeNote || null,
          status: "pending"
        };
        const saved = await sbUpsert("marketplace_trades", tradeObj);
        if (Array.isArray(saved) && saved[0]) trades.unshift(saved[0]);

        document.getElementById("tm")?.remove();
        showToast("Trade proposed! 🤝");
        render();

      } catch (e) {
        console.error("[proposeTrade]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        if (proposeBtn) { proposeBtn.disabled = false; proposeBtn.innerHTML = "🤝 PROPOSE TRADE"; }
      }
    }

    // ─────────────────────────────────────────────
    //  ACCEPT TRADE
    //  Accepter delegates their NFTs to escrow + auth message
    //  Then edge fn swaps both sides
    // ─────────────────────────────────────────────
    async function acceptTrade(tradeId) {
      if (!walletAddress || !walletProvider) { showWalletPicker(); return; }
      const trade = trades.find(t => String(t.id) === String(tradeId));
      if (!trade) { showToast("Trade not found", true); return; }

      const wantNfts = trade.want_nfts || [];
      if (!wantNfts.length) {
        showToast("Invalid trade — no cards requested from you", true);
        return;
      }

      const btn = document.querySelector(`[data-trade-accept="${tradeId}"]`);
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`; }

      // Track which NFTs we delegated so we can revoke on failure
      const delegatedMints = [];

      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction } = web3;
        const conn = new Connection(RPC, "confirmed");

        // STEP 1: Verify you actually own all the wanted NFTs
        showToast("Verifying ownership...");
        for (const nft of wantNfts) {
          const details = await getAssetDetails(nft.mint);
          if (details.owner !== walletAddress) {
            throw new Error(`You don't own ${nft.name || nft.mint} — can't complete this trade`);
          }
        }

        // STEP 2: Delegate the wanted NFTs (your NFTs) to escrow
        for (const nft of wantNfts) {
          const details = await getAssetDetails(nft.mint);
          if (details.delegate === ESCROW_ADDRESS) {
            delegatedMints.push(nft.mint);
            continue; // already delegated
          }

          showToast(`Delegating ${nft.name || "NFT"} to escrow...`);
          const ownerPK = safePK(PublicKey, walletAddress, "walletAddress");
          const escrowPK = safePK(PublicKey, ESCROW_ADDRESS, "ESCROW_ADDRESS");
          const treePK = safePK(PublicKey, details.treeId, "treeId");
          const [treeAuthorityPK] = getTreeAuthority(PublicKey, treePK);
          const prevDelegatePK = safePK(PublicKey, details.delegate, "delegate");

          const delegateIx = buildDelegateIx(PublicKey, {
            ownerPK, previousDelegatePK: prevDelegatePK, newDelegatePK: escrowPK,
            treePK, treeAuthorityPK,
            root: details.root, dataHash: details.dataHash, creatorHash: details.creatorHash,
            nonce: details.leafId, index: details.leafId,
            proofPath: details.proofPath
          });

          const tx = new Transaction().add(delegateIx);
          const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
          tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
          tx.feePayer = ownerPK;

          const signed = await walletProvider.signTransaction(tx);
          const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
          await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");
          delegatedMints.push(nft.mint);
        }

        // STEP 3: Sign auth message to prove identity
        const authMsg = `accept-trade:${tradeId}:${walletAddress}`;
        const authBytes = new TextEncoder().encode(authMsg);
        if (!walletProvider.signMessage) throw new Error("Wallet does not support signMessage");
        const authSigRaw = await walletProvider.signMessage(authBytes, "utf8");
        let sigBytes;
        if (authSigRaw instanceof Uint8Array) sigBytes = authSigRaw;
        else if (authSigRaw?.signature instanceof Uint8Array) sigBytes = authSigRaw.signature;
        else if (authSigRaw?.data instanceof Uint8Array) sigBytes = authSigRaw.data;
        else sigBytes = new Uint8Array(Object.values(authSigRaw));
        const sigB64 = btoa(sigBytes.reduce((s, b) => s + String.fromCharCode(b), ""));

        // STEP 4: Call edge function to settle
        showToast("Settling trade...");
        const result = await cosign({
          action: "settle-trade",
          tradeId: tradeId,
          accepter: walletAddress,
          authMessage: authMsg,
          authSignature: sigB64
        });
        console.log("[acceptTrade] result:", result);

        // Success
        trade.status = "completed";
        showToast("Trade completed! 🎉");
        loadCabbageData(); // refresh points
        await fetchMyNfts();
        render();

      } catch (e) {
        console.error("[acceptTrade]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        if (btn) { btn.disabled = false; btn.innerHTML = "ACCEPT TRADE"; }

        // RECOVERY: If we delegated NFTs but settle failed, offer to revoke
        if (delegatedMints.length > 0) {
          setTimeout(() => {
            if (confirm(`Trade settlement failed but ${delegatedMints.length} NFT(s) were delegated to escrow.\n\nRevoke delegations to get them back?`)) {
              revokeTradeDelegations(delegatedMints);
            }
          }, 500);
        }
      }
    }

    // Revoke escrow delegation on NFTs (recovery for failed trades)
    async function revokeTradeDelegations(mints) {
      if (!walletAddress || !walletProvider) return;
      try {
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction } = web3;
        const conn = new Connection(RPC, "confirmed");

        for (const mint of mints) {
          try {
            showToast(`Revoking delegation on ${short(mint, 6, 4)}...`);
            const details = await getAssetDetails(mint);
            if (details.delegate !== ESCROW_ADDRESS) continue; // already revoked
            if (details.owner !== walletAddress) continue; // not ours

            const ownerPK = new PublicKey(walletAddress);
            const treePK = new PublicKey(details.treeId);
            const [treeAuthorityPK] = getTreeAuthority(PublicKey, treePK);

            const delegateIx = buildDelegateIx(PublicKey, {
              ownerPK, previousDelegatePK: new PublicKey(ESCROW_ADDRESS), newDelegatePK: ownerPK,
              treePK, treeAuthorityPK,
              root: details.root, dataHash: details.dataHash, creatorHash: details.creatorHash,
              nonce: details.leafId, index: details.leafId,
              proofPath: details.proofPath
            });

            const tx = new Transaction().add(delegateIx);
            const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
            tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
            tx.feePayer = ownerPK;

            const signed = await walletProvider.signTransaction(tx);
            const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
            await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");
          } catch (err) {
            console.error("[revokeTradeDelegations] failed for", mint, err);
          }
        }
        showToast("Delegations revoked — your NFTs are safe ✓");
      } catch (e) {
        console.error("[revokeTradeDelegations]", e);
        showToast("Revoke failed: " + (e.message || "unknown"), true);
      }
    }

    // ─────────────────────────────────────────────
    //  CANCEL TRADE (proposer cancels)
    // ─────────────────────────────────────────────
    async function cancelTrade(tradeId) {
      if (!walletAddress) return;
      const trade = trades.find(t => String(t.id) === String(tradeId));
      if (!trade) { showToast("Trade not found", true); return; }
      if (trade.from_wallet !== walletAddress) { showToast("Not your trade", true); return; }

      const btn = document.querySelector(`[data-trade-cancel="${tradeId}"]`);
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`; }

      try {
        // Revoke delegation on offered NFTs
        const web3 = await getWeb3();
        const { Connection, PublicKey, Transaction } = web3;
        const conn = new Connection(RPC, "confirmed");

        for (const nft of (trade.offer_nfts || [])) {
          try {
            const details = await getAssetDetails(nft.mint);
            if (details.delegate === ESCROW_ADDRESS && details.owner === walletAddress) {
              showToast(`Revoking delegation on ${nft.name || "NFT"}...`);
              const ownerPK = new PublicKey(walletAddress);
              const treePK = new PublicKey(details.treeId);
              const [treeAuthorityPK] = getTreeAuthority(PublicKey, treePK);

              const delegateIx = buildDelegateIx(PublicKey, {
                ownerPK, previousDelegatePK: new PublicKey(ESCROW_ADDRESS), newDelegatePK: ownerPK,
                treePK, treeAuthorityPK,
                root: details.root, dataHash: details.dataHash, creatorHash: details.creatorHash,
                nonce: details.leafId, index: details.leafId,
                proofPath: details.proofPath
              });

              const tx = new Transaction().add(delegateIx);
              const { blockhash, lastValidBlockHeight } = await conn.getLatestBlockhash();
              tx.recentBlockhash = blockhash; tx.lastValidBlockHeight = lastValidBlockHeight;
              tx.feePayer = ownerPK;

              const signed = await walletProvider.signTransaction(tx);
              const sig = await conn.sendRawTransaction(signed.serialize(), { skipPreflight: false });
              await conn.confirmTransaction({ signature: sig, blockhash, lastValidBlockHeight }, "confirmed");
            }
          } catch (e) { console.error("[cancelTrade] revoke delegation error:", e); }
        }

        // Return sweetener if any
        if (parseFloat(trade.sweetener_sol) > 0) {
          showToast("Returning SOL sweetener from escrow...");
          await cosign({ action: "cancel-offer", mint: `trade-${tradeId}`, buyer: walletAddress });
        }

        // Update Supabase
        await fetch(`${SB_URL}/rest/v1/marketplace_trades?id=eq.${tradeId}`, {
          method: "PATCH",
          headers: { ...SB_HDR, Prefer: "return=representation" },
          body: JSON.stringify({ status: "cancelled" })
        });

        trade.status = "cancelled";
        showToast("Trade cancelled ✓");
        render();

      } catch (e) {
        console.error("[cancelTrade]", e);
        if (e.code === 4001 || e.message?.toLowerCase().includes("cancel") || e.message?.toLowerCase().includes("reject")) {
          showToast("Cancelled", true);
        } else {
          showToast("Failed: " + (e.message || "unknown"), true);
        }
        if (btn) { btn.disabled = false; btn.innerHTML = "CANCEL TRADE"; }
      }
    }

    // ─────────────────────────────────────────────
    //  DECLINE TRADE (recipient declines)
    // ─────────────────────────────────────────────
    async function declineTrade(tradeId) {
      if (!walletAddress) return;
      const trade = trades.find(t => String(t.id) === String(tradeId));
      if (!trade) return;

      const btn = document.querySelector(`[data-trade-decline="${tradeId}"]`);
      if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>`; }

      try {
        await fetch(`${SB_URL}/rest/v1/marketplace_trades?id=eq.${tradeId}`, {
          method: "PATCH",
          headers: { ...SB_HDR, Prefer: "return=representation" },
          body: JSON.stringify({ status: "declined" })
        });

        trade.status = "declined";
        showToast("Trade declined");
        render();
      } catch (e) {
        console.error("[declineTrade]", e);
        showToast("Failed: " + (e.message || "unknown"), true);
        if (btn) { btn.disabled = false; btn.innerHTML = "DECLINE"; }
      }
    }


    // ─────────────────────────────────────────────
    //  NFT DETAIL MODAL
    // ─────────────────────────────────────────────
    function renderModal() {
      if (!selectedNft) return;
      const nft = selectedNft;
      const yours = walletAddress && nft.owner === walletAddress;
      const listing = listings[nft.mint];
      const nftOffers = (offers[nft.mint] || []).sort((a, b) => b.price_sol - a.price_sol);
      const myOffer = nftOffers.find(o => o.buyer === walletAddress);

      const ov = document.createElement("div");
      ov.className = "modal-bg";
      ov.onclick = e => { if (e.target === ov) { selectedNft = null; render(); } };

      let traitsHtml = "";
      if (nft._loading) {
        traitsHtml = `<div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--g2);letter-spacing:2px;margin-bottom:8px">TRAITS</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${[1, 2, 3, 4].map(() => `<div class="sk" style="height:24px;width:80px;border-radius:6px"></div>`).join("")}</div>
    </div>`;
      } else if (nft.attributes?.length) {
        traitsHtml = `<div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--g2);letter-spacing:2px;margin-bottom:6px">TRAITS</div>
      <div>${nft.attributes.map(a => `<span class="trait"><span style="color:var(--g1)">${a.trait_type}: </span><span style="color:#ccc">${a.value}</span></span>`).join("")}</div>
    </div>`;
      }

      // Offers panel for owner
      let offersHtml = "";
      if (yours && nftOffers.length) {
        offersHtml = `<div class="divider"></div>
      <div style="font-size:10px;color:var(--g2);letter-spacing:2px;margin-bottom:8px">OFFERS (${nftOffers.length})</div>`;
        nftOffers.forEach(o => {
          const safeOffer = JSON.stringify({ mint: o.mint, buyer: o.buyer, price_sol: o.price_sol, name: o.name || "", image: o.image || "" });
          offersHtml += `<div class="offer-row">
        <div>
          <div style="font-size:13px;color:#fff;font-family:var(--d);letter-spacing:2px">◎ ${o.price_sol} SOL</div>
          <div style="font-size:9px;color:var(--g2);margin-top:2px">${short(o.buyer, 6, 4)}</div>
        </div>
        <button class="btn-green" id="accept-${o.buyer.slice(0, 6)}" style="width:auto;padding:6px 14px;font-size:12px"
          onclick='acceptOffer(${safeOffer.replace(/'/g, "&#39;")})'>ACCEPT</button>
      </div>`;
        });
      }

      // My offer status for buyer
      let myOfferHtml = "";
      if (!yours && myOffer) {
        myOfferHtml = `<div style="padding:8px 12px;background:var(--rb);border:1px solid rgba(255,0,60,.15);border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:9px;color:var(--r);letter-spacing:2px">YOUR OFFER: ◎ ${myOffer.price_sol} SOL</span>
      <button class="btn-danger" style="padding:4px 10px;font-size:10px" onclick="cancelOffer('${nft.mint}')">CANCEL</button>
    </div>`;
      }

      // Action buttons
      let actions = "";
      if (!walletAddress) {
        actions = `<button class="wallet-btn" style="width:100%;justify-content:center" onclick="showWalletPicker()"><span>👛</span> CONNECT TO TRADE</button>`;
      } else if (yours) {
          actions = `<button class="btn-primary" id="list-btn">${listing ? "MANAGE LISTING" : "LIST FOR SALE"}</button>`;
      } else {
        actions = `<div style="display:flex;gap:8px">
      ${listing
            ? `<button class="btn-green" style="flex:2" id="buy-btn">BUY NOW — ◎ ${listing.price_sol} SOL</button>`
            : `<div style="flex:2;padding:12px;background:#060606;border:1px solid #161616;border-radius:8px;font-size:10px;color:var(--g2);display:flex;align-items:center;justify-content:center">NOT LISTED</div>`}
      <button class="btn-ghost" style="flex:1;white-space:nowrap" id="offer-btn">MAKE OFFER</button>
    </div>
    <button class="btn-ghost" style="width:100%;margin-top:8px;border-color:rgba(255,165,0,.25);color:#ffa500" id="trade-from-modal-btn">🔄 PROPOSE TRADE</button>`;
      }

      ov.innerHTML = `<div class="modal" style="max-width:860px" onclick="event.stopPropagation()">
    <button class="modal-close" id="close-modal">✕</button>
    <div style="flex:1 1 340px;min-height:300px;background:#030303;display:flex;align-items:center;justify-content:center">
      ${nft.image ? `<img src="${nft.image}" alt="${nft.name}" style="width:100%;height:100%;object-fit:contain;max-height:460px">` : `<span style="font-size:52px;opacity:.1">🐦</span>`}
    </div>
    <div style="flex:1 1 320px;padding:26px;min-width:260px;display:flex;flex-direction:column">
      <h2 style="font-family:var(--d);font-size:28px;color:#fff;letter-spacing:3px;line-height:1;margin-bottom:8px">${nft.name}</h2>
      <div style="font-size:10px;color:var(--g2);margin-bottom:${listing ? '6px' : '14px'}">
        Owner: <span style="color:var(--g1)">${short(nft.owner, 8, 6)}</span>
        ${yours ? `<span class="tg" style="margin-left:6px;background:var(--grna);color:var(--grn)">YOU</span>` : ""}
      </div>
      ${listing ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:12px 14px;background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.12);border-radius:8px">
        <span style="font-family:var(--d);font-size:24px;color:var(--grn);letter-spacing:2px">◎ ${listing.price_sol} SOL</span>
        <span style="font-size:9px;color:var(--g2);margin-left:auto">Seller gets ${(listing.price_sol * (1 - FEE_PCT)).toFixed(4)} SOL</span>
      </div>`: ""}
      ${traitsHtml}
      ${myOfferHtml}
      ${actions}
      ${offersHtml}
      <div style="font-size:9px;color:var(--g2);margin-top:14px;word-break:break-all;line-height:1.6">Mint: ${nft.mint}</div>
    </div>
  </div>`;

      document.getElementById("app").appendChild(ov);
      document.getElementById("close-modal").onclick = () => { selectedNft = null; render(); };
      document.getElementById("list-btn")?.addEventListener("click", () => { ov.remove(); showListingModal(nft); });
      document.getElementById("buy-btn")?.addEventListener("click", () => {
        console.log("[BUY] clicked — listing:", listing, "wallet:", walletAddress, "provider:", !!walletProvider);
        if (!listing) { console.error("[BUY] no listing object"); return; }
        if (!walletAddress) { showWalletPicker(); return; }
        buyNft(listing);
      });
      document.getElementById("offer-btn")?.addEventListener("click", () => { ov.remove(); showOfferModal(nft); });
      document.getElementById("trade-from-modal-btn")?.addEventListener("click", () => {
        ov.remove();
        selectedNft = null;
        // Pre-fill trade with this NFT's owner as counterparty and this NFT as wanted
        if (!walletAddress) { showWalletPicker(); return; }
        if (!myNfts.length) { showToast("Loading your NFTs...", true); fetchMyNfts(); return; }
        _tradeStep = 1;
        _tradeOffer = [];
        _tradeWant = [{ mint: nft.mint, name: nft.name, image: nft.image }];
        _tradeCounterparty = nft.owner || "";
        _tradeSweetener = 0;
        _tradeNote = "";
        _tradeOpenToAll = false;
        counterpartyNfts = [];
        renderTradeModal();
      });
    }

    // ─────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", async () => {
      await computeDiscriminators();
      await loadMarketData();
      loadTraits();
      fetchPage(1);
    });
  </script>
</body>
